            async function startBrowserCamera() {
                const startToken = ++browserStartToken;
                videoElement.style.display = 'block';
                canvasElement.style.display = 'block';
                canvasElement.style.transform = 'scaleX(-1)';
                statusElement.textContent = 'Starting browser camera...';

                try {
                    // Try to get a high resolution stream
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: {
                            width: { ideal: 1920 },
                            height: { ideal: 1080 },
                            facingMode: 'user'
                        }
                    });

                    if (startToken !== browserStartToken || controlState.source !== 'browser') {
                        stream.getTracks().forEach((track) => track.stop());
                        return;
                    }
                    
                    videoElement.srcObject = stream;
                    
                    await new Promise((resolve) => {
                        videoElement.onloadedmetadata = () => {
                            // Ensure layout is updated when video loads
                            initializeLayout();
                            resolve(videoElement);
                        };
                    });

                    if (startToken !== browserStartToken || controlState.source !== 'browser') {
                        stopBrowserCamera();
                        return;
                    }

                    if (!mediaPipeHands) {
                        const hands = await initMediaPipeHands();
                        if (!hands) {
                            return;
                        }
                        mediaPipeHands = hands;
                        mediaPipeHands.onResults(onResults);
                    }

                    if (startToken !== browserStartToken || controlState.source !== 'browser' || !mediaPipeHands) {
                        stopBrowserCamera();
                        return;
                    }

                    if (mediaPipeCamera) {
                        mediaPipeCamera.stop();
                    }

                    mediaPipeCamera = new Camera(videoElement, {
                        onFrame: async () => {
                            if (controlState.source !== 'browser' || !mediaPipeHands) {
                                return;
                            }
                            await mediaPipeHands.send({image: videoElement});
                        },
                        width: 1920,
                        height: 1080
                    });

                    mediaPipeCamera.start();
                    browserCameraRunning = true;
                    statusElement.textContent = 'Browser camera ready';
                } catch (error) {
                    if (controlState.source === 'browser') {
                        statusElement.textContent = `Error accessing webcam: ${error.message}`;
                    }
                    console.error('Error accessing webcam:', error);
                }
            }

            function stopBrowserCamera() {
                browserStartToken++;

                if (mediaPipeCamera) {
                    try {
                        mediaPipeCamera.stop();
                    } catch (error) {
                        console.warn('Error stopping MediaPipe camera:', error);
                    }
                    mediaPipeCamera = null;
                }

                if (videoElement.srcObject) {
                    videoElement.srcObject.getTracks().forEach((track) => track.stop());
                    videoElement.srcObject = null;
                }

                browserCameraRunning = false;
                rightHandActive = false;
                leftHandActive = false;
                canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
                videoElement.style.display = 'none';
                canvasElement.style.display = 'none';
            }
            
            // Helper function to generate random neon colors
            function getRandomNeonColor() {
                const neonColors = [
                    0xFF00FF, // Magenta
                    0x00FFFF, // Cyan
                    0xFF3300, // Neon Orange
                    0x39FF14, // Neon Green
                    0xFF0099, // Neon Pink
                    0x00FF00, // Lime
                    0xFF6600, // Neon Orange-Red
                    0xFFFF00  // Yellow
                ];
                return neonColors[Math.floor(Math.random() * neonColors.length)];
            }

            // Create a high-quality soft circular glow texture dynamically for particles
            function createCircleTexture() {
                const size = 128; // Double the resolution to 128x128 for razor-sharp textures
                const canvas = document.createElement('canvas');
                canvas.width = size;
                canvas.height = size;
                const ctx = canvas.getContext('2d');

                const gradient = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
                gradient.addColorStop(0, 'rgba(255,255,255,1)');
                gradient.addColorStop(0.45, 'rgba(255,255,255,1)'); // Expand solid core
                gradient.addColorStop(0.65, 'rgba(255,255,255,0.55)'); // Tight transition falloff
                gradient.addColorStop(0.85, 'rgba(255,255,255,0)'); // Terminate blur early
                gradient.addColorStop(1, 'rgba(255,255,255,0)');

                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, size, size);

                return new THREE.CanvasTexture(canvas);
            }

            // Generate authentic Nailong color mapping (Yellow body, Ivory White belly, Orange-Yellow back shadow)
            function getNailongParticleColor(px, py, pz) {
                // Belly: front side (Z > 0.4), center X (abs(X) < 0.55), lower-mid body (Y between -0.8 and 0.4)
                const isBelly = (pz > 0.4) && (Math.abs(px) < 0.55) && (py > -0.8 && py < 0.4);
                
                if (isBelly) {
                    return new THREE.Color(0xfffdf0).multiplyScalar(0.95 + Math.random() * 0.05); // Creamy white
                }
                
                // Back shadow shading
                if (pz < -0.2) {
                    return new THREE.Color(0xffa801).multiplyScalar(0.9 + Math.random() * 0.1); // Warm orange-yellow shadow
                }
                
                // Main body yellow
                return new THREE.Color(0xffdd59).multiplyScalar(0.95 + Math.random() * 0.05); // Bright yellow
            }

            // Generate elegant Cosmic Nebula color based on spatial distance from center
            function getNebulaColor(distance, maxRadius = 2.0) {
                const t = Math.min(1.0, Math.max(0.0, distance / maxRadius));
                
                const cCore = new THREE.Color(0xfff7e6); // Creamy Gold-White
                const cMid = new THREE.Color(0xd630ae);  // Deep Amethyst Magenta
                const cEdge = new THREE.Color(0x00e5ff); // Cosmic Electric Cyan
                const cOuter = new THREE.Color(0x1a2a6c); // Deep Midnight Blue

                const color = new THREE.Color();
                if (t < 0.28) {
                    const localT = t / 0.28;
                    color.lerpColors(cCore, cMid, localT);
                } else if (t < 0.72) {
                    const localT = (t - 0.28) / 0.44;
                    color.lerpColors(cMid, cEdge, localT);
                } else {
                    const localT = (t - 0.72) / 0.28;
                    color.lerpColors(cEdge, cOuter, localT);
                }
                return color;
            }

            function precomputeShapes(baseColorHex = "#00e5ff") {
                const count = PARTICLE_COUNT;
                
                // 1. Initialize brightness factors if not already done
                if (!brightnessFactors) {
                    brightnessFactors = new Float32Array(count);
                    for (let i = 0; i < count; i++) {
                        brightnessFactors[i] = 0.82 + 0.32 * Math.random();
                    }
                }

                // 2. Generate HSL gradient color stops from the color picker base color
                const cBase = new THREE.Color(baseColorHex);
                const tempHSL = {};
                cBase.getHSL(tempHSL);
                
                const cCore = new THREE.Color().setHSL(tempHSL.h, Math.max(0.1, tempHSL.s - 0.25), Math.min(1.0, tempHSL.l + 0.35));
                const cMid = cBase.clone();
                const cEdge = new THREE.Color().setHSL((tempHSL.h + 0.12) % 1.0, tempHSL.s, Math.max(0.2, tempHSL.l - 0.1));
                const cOuter = new THREE.Color().setHSL((tempHSL.h + 0.22) % 1.0, Math.min(1.0, tempHSL.s + 0.1), Math.max(0.05, tempHSL.l - 0.32));

                function getGradientColor(t) {
                    const color = new THREE.Color();
                    if (t < 0.28) {
                        color.lerpColors(cCore, cMid, t / 0.28);
                    } else if (t < 0.72) {
                        color.lerpColors(cMid, cEdge, (t - 0.28) / 0.44);
                    } else {
                        color.lerpColors(cEdge, cOuter, (t - 0.72) / 0.28);
                    }
                    return color;
                }

                // 3. Initialize positions if not already initialized
                const initPositions = !spherePositions;
                if (initPositions) {
                    spherePositions = new Float32Array(count * 3);
                    galaxyPositions = new Float32Array(count * 3);
                    saturnPositions = new Float32Array(count * 3);
                    lotusPositions = new Float32Array(count * 3);
                    leafPositions = new Float32Array(count * 3);
                    heartPositions = new Float32Array(count * 3);
                }

                // Initialize color arrays
                sphereColors = new Float32Array(count * 3);
                galaxyColors = new Float32Array(count * 3);
                saturnColors = new Float32Array(count * 3);
                lotusColors = new Float32Array(count * 3);
                leafColors = new Float32Array(count * 3);
                heartColors = new Float32Array(count * 3);

                // Helper for Box-Muller Gaussian noise
                function randomNormal() {
                    let u = 0, v = 0;
                    while (u === 0) u = Math.random();
                    while (v === 0) v = Math.random();
                    return Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
                }

                for (let i = 0; i < count; i++) {
                    const idx = i * 3;
                    const bright = brightnessFactors[i];

                    // ==================== SPHERE ====================
                    if (initPositions) {
                        const theta = Math.random() * Math.PI * 2;
                        const u = Math.random() * 2 - 1;
                        const shellBias = Math.random();
                        const radius = 2.0 * (0.38 + 0.62 * Math.pow(shellBias, 0.28));
                        const ring = Math.sqrt(1 - u * u);
                        
                        spherePositions[idx] = radius * ring * Math.cos(theta);
                        spherePositions[idx + 1] = radius * u;
                        spherePositions[idx + 2] = radius * ring * Math.sin(theta);
                    }
                    const sDist = Math.sqrt(
                        spherePositions[idx]**2 + 
                        spherePositions[idx + 1]**2 + 
                        spherePositions[idx + 2]**2
                    );
                    const sColor = getGradientColor(sDist / 2.0).multiplyScalar(bright);
                    sphereColors[idx] = sColor.r;
                    sphereColors[idx + 1] = sColor.g;
                    sphereColors[idx + 2] = sColor.b;

                    // ==================== GALAXY ====================
                    if (initPositions) {
                        // 15% Core bulge, 85% Spiral arms
                        if (i < count * 0.15) {
                            const r = Math.random() * 0.5;
                            const theta = Math.random() * Math.PI * 2;
                            const u = Math.random() * 2 - 1;
                            const ring = Math.sqrt(1 - u * u);
                            
                            galaxyPositions[idx] = r * ring * Math.cos(theta);
                            galaxyPositions[idx + 1] = r * u * 0.5; // Flattened
                            galaxyPositions[idx + 2] = r * ring * Math.sin(theta);
                        } else {
                            const arm = Math.random() < 0.5 ? 0 : 1;
                            const t = Math.random();
                            const theta = t * 8.0; // turns
                            const r = 0.4 + 1.8 * t;
                            const spread = 0.18 * (1.0 - 0.5 * t);
                            const angle = theta + arm * Math.PI + randomNormal() * spread;
                            
                            galaxyPositions[idx] = r * Math.cos(angle) + randomNormal() * 0.06;
                            galaxyPositions[idx + 1] = randomNormal() * 0.1 * (1.0 - t);
                            galaxyPositions[idx + 2] = r * Math.sin(angle) + randomNormal() * 0.06;
                        }
                    }
                    const gDist = Math.sqrt(
                        galaxyPositions[idx]**2 + 
                        galaxyPositions[idx + 1]**2 + 
                        galaxyPositions[idx + 2]**2
                    );
                    const isCore = i < count * 0.15;
                    const gColor = isCore 
                        ? cCore.clone().lerp(cMid, Math.random() * 0.3).multiplyScalar(bright)
                        : getGradientColor(gDist / 2.2).multiplyScalar(bright);
                    galaxyColors[idx] = gColor.r;
                    galaxyColors[idx + 1] = gColor.g;
                    galaxyColors[idx + 2] = gColor.b;

                    // ==================== SATURN ====================
                    if (initPositions) {
                        // 55% Planet sphere, 45% flat ring
                        if (i < count * 0.55) {
                            const theta = Math.random() * Math.PI * 2;
                            const u = Math.random() * 2 - 1;
                            const r = 1.0 * Math.pow(Math.random(), 0.3);
                            const ring = Math.sqrt(1 - u * u);
                            
                            saturnPositions[idx] = r * ring * Math.cos(theta);
                            saturnPositions[idx + 1] = r * u;
                            saturnPositions[idx + 2] = r * ring * Math.sin(theta);
                        } else {
                            const r = 1.4 + 1.1 * Math.random();
                            const theta = Math.random() * Math.PI * 2;
                            const rx = r * Math.cos(theta) + randomNormal() * 0.03;
                            const ry = randomNormal() * 0.02;
                            const rz = r * Math.sin(theta) + randomNormal() * 0.03;
                            
                            // Tilt ring by 20 degrees around X-axis
                            const cosTilt = Math.cos(0.35);
                            const sinTilt = Math.sin(0.35);
                            
                            saturnPositions[idx] = rx;
                            saturnPositions[idx + 1] = ry * cosTilt - rz * sinTilt;
                            saturnPositions[idx + 2] = ry * sinTilt + rz * cosTilt;
                        }
                    }
                    if (i < count * 0.55) {
                        const pColor = cMid.clone().lerp(cCore, 0.25).multiplyScalar(bright);
                        saturnColors[idx] = pColor.r;
                        saturnColors[idx + 1] = pColor.g;
                        saturnColors[idx + 2] = pColor.b;
                    } else {
                        const rColor = getGradientColor(0.3 + Math.random() * 0.5).multiplyScalar(bright);
                        saturnColors[idx] = rColor.r;
                        saturnColors[idx + 1] = rColor.g;
                        saturnColors[idx + 2] = rColor.b;
                    }

                    // ==================== LOTUS ====================
                    if (initPositions) {
                        // 15% center pistil, 85% layered petals
                        if (i < count * 0.15) {
                            const r = Math.random() * 0.3;
                            const theta = Math.random() * Math.PI * 2;
                            const h = (Math.random() * 2 - 1) * 0.15;
                            
                            lotusPositions[idx] = r * Math.cos(theta);
                            lotusPositions[idx + 1] = h - 0.5;
                            lotusPositions[idx + 2] = r * Math.sin(theta);
                        } else {
                            const petalIdx = i % 4;
                            const numPetals = [6, 10, 14, 18][petalIdx];
                            const scale = [0.85, 1.25, 1.65, 2.05][petalIdx];
                            const tilt = [0.25, 0.45, 0.70, 0.95][petalIdx];
                            
                            const pIndex = Math.floor(Math.random() * numPetals);
                            const phi0 = (pIndex + (petalIdx % 2) * 0.5) * (Math.PI * 2 / numPetals);
                            
                            const u = Math.random();
                            const v = Math.random() * 2 - 1;
                            
                            const w = 0.35 * Math.sin(Math.PI * u) * (1.0 - 0.25 * u);
                            
                            const lx = v * w * scale;
                            const ly = u * 1.6 * scale;
                            const lz = -0.22 * Math.sin(Math.PI * u) * scale;
                            
                            const cosT = Math.cos(tilt);
                            const sinT = Math.sin(tilt);
                            const ty = ly * cosT - lz * sinT;
                            const tz = ly * sinT + lz * cosT;
                            
                            lotusPositions[idx] = lx * Math.cos(phi0) + tz * Math.sin(phi0);
                            lotusPositions[idx + 1] = ty - 0.7;
                            lotusPositions[idx + 2] = -lx * Math.sin(phi0) + tz * Math.cos(phi0);
                        }
                    }
                    if (i < count * 0.15) {
                        const pistilColor = new THREE.Color(0xffe066).multiplyScalar(bright);
                        lotusColors[idx] = pistilColor.r;
                        lotusColors[idx + 1] = pistilColor.g;
                        lotusColors[idx + 2] = pistilColor.b;
                    } else {
                        const pColor = getGradientColor(0.1 + 0.8 * (i % 5 / 5)).multiplyScalar(bright);
                        lotusColors[idx] = pColor.r;
                        lotusColors[idx + 1] = pColor.g;
                        lotusColors[idx + 2] = pColor.b;
                    }

                    // ==================== LEAF ====================
                    if (initPositions) {
                        // 15% midrib (central vein) & stem
                        if (i < count * 0.15) {
                            const t = -0.15 + 1.15 * Math.random(); // -0.15 (stem base) to 1.0 (leaf tip)
                            const lx = 0;
                            const ly = (t - 0.5) * 3.4;
                            const tPositive = Math.max(0, t);
                            const lz = -0.32 * Math.sin(Math.PI * tPositive);
                            
                            leafPositions[idx] = lx;
                            leafPositions[idx + 1] = ly;
                            leafPositions[idx + 2] = lz;
                        } 
                        // 20% side veins branching out at an angle
                        else if (i < count * 0.35) {
                            const v = Math.floor(Math.random() * 6); // 6 pairs of side veins
                            const t0 = 0.12 + 0.72 * (v / 5); // spacing along the leaf length
                            const side = Math.random() < 0.5 ? -1 : 1;
                            const d = Math.random(); // distance from midrib to edge
                            
                            const widthProfile = 1.15 * Math.sin(Math.PI * t0) * (0.42 + 0.58 * t0);
                            const lx = side * d * widthProfile;
                            const ly = (t0 - 0.5) * 3.4 + 0.42 * Math.abs(lx); // angled upwards
                            
                            // Reconstruct local t for proper bending
                            const tCurr = clamp((ly / 3.4) + 0.5, 0.0, 1.0);
                            const fold = 0.28 * Math.abs(lx);
                            const curve = -0.32 * Math.sin(Math.PI * tCurr);
                            const lz = curve + fold + randomNormal() * 0.02;
                            
                            leafPositions[idx] = lx + randomNormal() * 0.015;
                            leafPositions[idx + 1] = ly + randomNormal() * 0.015;
                            leafPositions[idx + 2] = lz;
                        }
                        // 65% blade body
                        else {
                            const t = Math.random(); // length position
                            const u = Math.random() * 2 - 1; // width position
                            
                            const widthProfile = 1.15 * Math.sin(Math.PI * t) * (0.42 + 0.58 * t);
                            const lx = u * widthProfile;
                            const ly = (t - 0.5) * 3.4;
                            
                            const fold = 0.28 * Math.abs(lx);
                            const curve = -0.32 * Math.sin(Math.PI * t);
                            const lz = curve + fold + randomNormal() * 0.04;
                            
                            leafPositions[idx] = lx + randomNormal() * 0.02;
                            leafPositions[idx + 1] = ly + randomNormal() * 0.02;
                            leafPositions[idx + 2] = lz;
                        }
                    }
                    // Color mapping: Leaf Green (Emerald Green body, Lime Green midrib/stem/veins)
                    // The leaf colors adapt to the color picker HSL to allow purple/blue/red leaves too!
                    const ly = leafPositions[idx + 1];
                    const lx = leafPositions[idx];
                    const leafT = clamp((ly / 3.4) + 0.5, 0.0, 1.0); // normalized 0 to 1
                    
                    const isVeinOrStem = (i < count * 0.35) || (Math.abs(lx) < 0.06);
                    let leafColor;
                    if (isVeinOrStem) {
                        // Bright lime-green or shifted bright version of the chosen picker color
                        const cStem = new THREE.Color().setHSL((tempHSL.h + 0.05) % 1.0, Math.min(1.0, tempHSL.s + 0.1), Math.min(1.0, tempHSL.l + 0.25));
                        leafColor = cStem.multiplyScalar(bright);
                    } else {
                        // Rich green or base HSL picker color
                        const cBaseHSL = new THREE.Color().setHSL(tempHSL.h, tempHSL.s, Math.max(0.12, tempHSL.l - 0.1));
                        const cShiftHSL = new THREE.Color().setHSL((tempHSL.h - 0.05 + 1.0) % 1.0, tempHSL.s, Math.max(0.08, tempHSL.l - 0.2));
                        leafColor = cBaseHSL.clone().lerp(cShiftHSL, leafT).multiplyScalar(bright);
                    }
                    leafColors[idx] = leafColor.r;
                    leafColors[idx + 1] = leafColor.g;
                    leafColors[idx + 2] = leafColor.b;

                    // ==================== HEART ====================
                    if (initPositions) {
                        const theta = Math.random() * Math.PI * 2 - Math.PI;
                        const phi = Math.random() * Math.PI - Math.PI / 2;
                        
                        const hx = 1.4 * Math.sin(theta)**3 * Math.cos(phi);
                        const hy = (1.3 * Math.cos(theta) - 0.5 * Math.cos(2*theta) - 0.2 * Math.cos(3*theta) - 0.1 * Math.cos(4*theta)) * Math.cos(phi);
                        const hz = 1.1 * Math.sin(phi) * (0.4 + 0.6 * Math.abs(Math.sin(theta)));
                        
                        const k = 0.22 + 0.78 * Math.pow(Math.random(), 0.5);
                        
                        heartPositions[idx] = hx * k;
                        heartPositions[idx + 1] = hy * k + 0.3;
                        heartPositions[idx + 2] = hz * k;
                    }
                    const hDist = Math.sqrt(
                        heartPositions[idx]**2 + 
                        heartPositions[idx + 1]**2 + 
                        heartPositions[idx + 2]**2
                    );
                    const heartBaseColor = new THREE.Color(0xff0844);
                    const heartEdgeColor = cMid.clone();
                    const hColor = heartBaseColor.clone().lerp(heartEdgeColor, hDist / 1.8).multiplyScalar(bright);
                    heartColors[idx] = hColor.r;
                    heartColors[idx + 1] = hColor.g;
                    heartColors[idx + 2] = hColor.b;
                }
            }

            function getTargetPositionArray(shape) {
                if (shape === 'galaxy') return galaxyPositions;
                if (shape === 'saturn') return saturnPositions;
                if (shape === 'lotus') return lotusPositions;
                if (shape === 'leaf') return leafPositions;
                if (shape === 'heart') return heartPositions;
                if (shape === 'nailong' || shape === 'nailong_solid') {
                    return (nailongLoaded && nailongBasePositions) ? nailongBasePositions : spherePositions;
                }
                return spherePositions;
            }

            function getTargetColorArray(shape) {
                if (shape === 'galaxy') return galaxyColors;
                if (shape === 'saturn') return saturnColors;
                if (shape === 'lotus') return lotusColors;
                if (shape === 'leaf') return leafColors;
                if (shape === 'heart') return heartColors;
                if (shape === 'nailong' || shape === 'nailong_solid') {
                    return (nailongLoaded && nailongColors) ? nailongColors : sphereColors;
                }
                return sphereColors;
            }

            function createParticleSphere({ count = PARTICLE_COUNT, radius = 2 }) {
                precomputeShapes();

                const geometry = new THREE.BufferGeometry();
                const positions = new Float32Array(count * 3);
                const colors = new Float32Array(count * 3);
                const phases = new Float32Array(count);

                currentBasePositions = new Float32Array(spherePositions);
                currentBaseColors = new Float32Array(sphereColors);

                for (let i = 0; i < count; i++) {
                    const pointIndex = i * 3;
                    positions[pointIndex] = spherePositions[pointIndex];
                    positions[pointIndex + 1] = spherePositions[pointIndex + 1];
                    positions[pointIndex + 2] = spherePositions[pointIndex + 2];

                    colors[pointIndex] = sphereColors[pointIndex];
                    colors[pointIndex + 1] = sphereColors[pointIndex + 1];
                    colors[pointIndex + 2] = sphereColors[pointIndex + 2];
                    
                    phases[i] = Math.random() * Math.PI * 2;
                }

                geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

                const material = new THREE.PointsMaterial({
                    size: 0.05, // Tuned for 8,000 particles to keep them crisp and bright
                    sizeAttenuation: true,
                    map: createCircleTexture(),
                    vertexColors: true,
                    transparent: true,
                    opacity: 0.88,
                    depthWrite: false,
                    blending: THREE.AdditiveBlending,
                });

                particlePhases = phases;
                particleMaterial = material;
                return new THREE.Points(geometry, material);
            }
            
            // Initialize Three.js
            function initThreeJS() {
                // Create scene
                scene = new THREE.Scene();
                
                // Create camera
                camera = new THREE.PerspectiveCamera(
                    75, 
                    window.innerWidth / window.innerHeight, 
                    0.1, 
                    1000
                );
                camera.position.z = 5;
                
                // Create renderer with transparent background
                renderer = new THREE.WebGLRenderer({ 
                    antialias: true, 
                    alpha: true  // Enable transparency
                });
                renderer.setPixelRatio(window.devicePixelRatio);
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setClearColor(0x000000, 0); // Transparent background
                threeContainer.appendChild(renderer.domElement);
                
                // Create a particle sphere with a faint wireframe shell.
                const geometry = new THREE.SphereGeometry(2, 32, 32);
                
                // Create a group to hold the particle cloud and wireframe shell.
                sphere = new THREE.Group();

                particleMesh = createParticleSphere({ count: PARTICLE_COUNT, radius: 2 });
                sphere.add(particleMesh);

                // Keep a subtle transparent fill to make the volume readable on camera backgrounds.
                const solidMaterial = new THREE.MeshBasicMaterial({ 
                    color: 0x00ffff,
                    transparent: true,
                    opacity: 0.06,
                    depthWrite: false
                });
                solidMesh = new THREE.Mesh(geometry, solidMaterial);
                sphere.add(solidMesh);
                
                // Create faint wireframe mesh with cyan-white color.
                const wireframeMaterial = new THREE.MeshBasicMaterial({
                    color: 0xcfffff,
                    wireframe: true,
                    transparent: true,
                    opacity: 0.18,
                });
                wireframeMesh = new THREE.Mesh(geometry, wireframeMaterial);
                sphere.add(wireframeMesh);
                scene.add(sphere);
                
                // Add ambient light and directional lights for proper 3D shading
                const ambientLight = new THREE.AmbientLight(0xffffff, 0.45);
                scene.add(ambientLight);

                const keyLight = new THREE.DirectionalLight(0xffffff, 0.85);
                keyLight.position.set(5, 8, 5);
                scene.add(keyLight);

                const fillLight = new THREE.DirectionalLight(0xe0f0ff, 0.35);
                fillLight.position.set(-5, 3, 2);
                scene.add(fillLight);
                
                // Start animation loop
                animate();
            }
            
            // Animation loop for Three.js
            function animate() {
                requestAnimationFrame(animate);
                
                // Rotate the sphere continuously, regardless of hand interaction
                if (sphere) {
                    currentSphereSize = currentSphereSize + (controlState.targetScale - currentSphereSize) * smoothingFactor;
                    sphere.scale.set(currentSphereSize, currentSphereSize, currentSphereSize);

                    if (controlState.handDetected) {
                        // Smoothly interpolate rotation to match hand orientation
                        sphere.rotation.x += (controlState.handRotX - sphere.rotation.x) * smoothingFactor;
                        sphere.rotation.y += (controlState.handRotY - sphere.rotation.y) * smoothingFactor;
                        sphere.rotation.z += (controlState.handRotZ - sphere.rotation.z) * smoothingFactor;
                    } else {
                        // Auto-spin when no hand is detected
                        sphere.rotation.x += 0.003 + controlState.rotateX;
                        sphere.rotation.y += 0.008 + controlState.rotateY;
                        sphere.rotation.z += (0 - sphere.rotation.z) * 0.05; // Return roll to 0
                    }
                    
                    // Add pulsing glow effect to the neon fill
                    const time = Date.now() * 0.001; // Convert to seconds
                    const pulseIntensity = 0.1 * Math.sin(time * 2) + 0.9; // Oscillate between 0.8 and 1.0

                    // Smoothly update sphereWeight (fading wireframe and volume out when morphing away from sphere)
                    const targetSphereWeight = (targetShape === 'sphere') ? 1.0 : 0.0;
                    sphereWeight += (targetSphereWeight - sphereWeight) * 0.08;

                    // Handle solid model opacity transitions for Nailong Solid
                    if (targetShape === 'nailong_solid') {
                        solidOpacity = Math.min(1.0, solidOpacity + 0.05);
                    } else {
                        solidOpacity = Math.max(0.0, solidOpacity - 0.08);
                    }

                    if (nailongSolidMesh && nailongSolidMaterial) {
                        nailongSolidMesh.visible = (solidOpacity > 0.01);
                        nailongSolidMaterial.opacity = solidOpacity;
                        nailongSolidMaterial.transparent = (solidOpacity < 0.99);
                    }

                    // Smoothly morph between shapes
                    const morphSpeed = 0.06;
                    const targetPosArr = getTargetPositionArray(targetShape);
                    const targetColArr = getTargetColorArray(targetShape);

                    // Interpolate turbulence Amount
                    turbulenceAmount += (targetTurbulence - turbulenceAmount) * 0.1;
                    targetTurbulence *= 0.92; // continuous decay of target turbulence

                    // Pinch-driven/dual-hand-driven diffusion factor
                    const diffusion = 1.0 + clamp((currentSphereSize - 1.0) * 0.35, -0.3, 0.65);

                    if (particleMesh && currentBasePositions && currentBaseColors && particlePhases) {
                        const positions = particleMesh.geometry.attributes.position.array;
                        const colorsAttr = particleMesh.geometry.attributes.color.array;

                        for (let i = 0; i < particlePhases.length; i++) {
                            const pointIndex = i * 3;

                            // 1. Morph base positions
                            currentBasePositions[pointIndex] += (targetPosArr[pointIndex] - currentBasePositions[pointIndex]) * morphSpeed;
                            currentBasePositions[pointIndex + 1] += (targetPosArr[pointIndex + 1] - currentBasePositions[pointIndex + 1]) * morphSpeed;
                            currentBasePositions[pointIndex + 2] += (targetPosArr[pointIndex + 2] - currentBasePositions[pointIndex + 2]) * morphSpeed;

                            // 2. Morph base colors
                            currentBaseColors[pointIndex] += (targetColArr[pointIndex] - currentBaseColors[pointIndex]) * morphSpeed;
                            currentBaseColors[pointIndex + 1] += (targetColArr[pointIndex + 1] - currentBaseColors[pointIndex + 1]) * morphSpeed;
                            currentBaseColors[pointIndex + 2] += (targetColArr[pointIndex + 2] - currentBaseColors[pointIndex + 2]) * morphSpeed;

                            const bx = currentBasePositions[pointIndex];
                            const by = currentBasePositions[pointIndex + 1];
                            const bz = currentBasePositions[pointIndex + 2];

                            // 3. Compute breathing wave
                            const wave = 1.0 + 0.035 * Math.sin(time * 2.2 + particlePhases[i]);

                            // 4. Compute high-frequency turbulence noise
                            const noiseFreq = 4.0;
                            const noiseSpeed = time * 7.5;
                            const phase = particlePhases[i];
                            const noiseX = Math.sin(by * noiseFreq + noiseSpeed + phase) * Math.cos(bz * noiseFreq + noiseSpeed);
                            const noiseY = Math.sin(bz * noiseFreq + noiseSpeed + phase) * Math.cos(bx * noiseFreq + noiseSpeed);
                            const noiseZ = Math.sin(bx * noiseFreq + noiseSpeed + phase) * Math.cos(by * noiseFreq + noiseSpeed);
                            
                            const jitterStrength = 0.26 * turbulenceAmount;

                            // Apply final coordinates
                            positions[pointIndex] = bx * wave * diffusion + noiseX * jitterStrength;
                            positions[pointIndex + 1] = by * wave * diffusion + noiseY * jitterStrength;
                            positions[pointIndex + 2] = bz * wave * diffusion + noiseZ * jitterStrength;

                            // Apply final colors
                            colorsAttr[pointIndex] = currentBaseColors[pointIndex];
                            colorsAttr[pointIndex + 1] = currentBaseColors[pointIndex + 1];
                            colorsAttr[pointIndex + 2] = currentBaseColors[pointIndex + 2];
                        }
                        particleMesh.geometry.attributes.position.needsUpdate = true;
                        particleMesh.geometry.attributes.color.needsUpdate = true;

                        // Smoothly fade particles out when solidification happens (nailong_solid)
                        const targetParticleOpacity = (targetShape === 'nailong_solid') ? 0.0 : (0.74 + 0.16 * pulseIntensity);
                        particleMesh.material.opacity += (targetParticleOpacity - particleMesh.material.opacity) * 0.1;
                    }
                    
                    // Fade out wireframe and solid volume as we morph away from sphere
                    if (wireframeMesh && wireframeMesh.material) {
                        wireframeMesh.material.opacity = sphereWeight * 0.18;
                        wireframeMesh.visible = (sphereWeight > 0.01);
                    }
                    if (solidMesh && solidMesh.material) {
                        solidMesh.material.opacity = sphereWeight * (0.035 + 0.035 * pulseIntensity);
                        solidMesh.visible = (sphereWeight > 0.01);
                    }
                }

                updateControlReadout();

                // Render the scene
                renderer.render(scene, camera);
            }
            
            // Calculate distance between two 3D points, correcting for camera aspect ratio
            function calculateDistance(point1, point2) {
                const dx = point1.x - point2.x;
                let aspect = 0.75; // default 4:3
                if (controlState.source === 'browser' && videoElement && videoElement.videoWidth) {
                    aspect = videoElement.videoHeight / videoElement.videoWidth;
                } else if (controlState.source === 'raspberry' && raspberryVideoElement && raspberryVideoElement.naturalWidth) {
                    aspect = raspberryVideoElement.naturalHeight / raspberryVideoElement.naturalWidth;
                } else if (canvasElement && canvasElement.width) {
                    aspect = canvasElement.height / canvasElement.width;
                }
                const dy = (point1.y - point2.y) * aspect;
                const dz = point1.z - point2.z;
                return Math.sqrt(dx * dx + dy * dy + dz * dz);
            }

            // Monitor finger gestures to switch particle shapes
            function processShapeSwitchingGestures(primaryHand, secondaryHand = null) {
                if (!primaryHand || primaryHand.length < 21) {
                    gestureHistory = [];
                    return;
                }

                // 1. Calculate palm length and extension ratios for the primary hand
                const palmLength = calculateDistance(primaryHand[0], primaryHand[9]);
                if (palmLength < 0.01) return;

                const indexDist = calculateDistance(primaryHand[0], primaryHand[8]);
                const middleDist = calculateDistance(primaryHand[0], primaryHand[12]);
                const ringDist = calculateDistance(primaryHand[0], primaryHand[16]);
                const pinkyDist = calculateDistance(primaryHand[0], primaryHand[20]);

                // Helper to check local straightness of a finger to bypass perspective foreshortening
                function isFingerStraight(hand, mcp, pip, dip, tip) {
                    const dKnuckleToTip = calculateDistance(hand[mcp], hand[tip]);
                    const dSegments = calculateDistance(hand[mcp], hand[pip]) + 
                                      calculateDistance(hand[pip], hand[dip]) + 
                                      calculateDistance(hand[dip], hand[tip]);
                    return dSegments > 0 ? (dKnuckleToTip / dSegments) > 0.80 : false;
                }

                const ratioThreshold = 1.3;
                const indexExtended = (indexDist / palmLength > ratioThreshold) || isFingerStraight(primaryHand, 5, 6, 7, 8);
                const middleExtended = (middleDist / palmLength > ratioThreshold) || isFingerStraight(primaryHand, 9, 10, 11, 12);
                const ringExtended = (ringDist / palmLength > ratioThreshold) || isFingerStraight(primaryHand, 13, 14, 15, 16);
                const pinkyExtended = (pinkyDist / palmLength > ratioThreshold) || isFingerStraight(primaryHand, 17, 18, 19, 20);

                // Calculate primary hand raised fingers count first
                let raisedCount = 0;
                if (indexExtended) raisedCount++;
                if (middleExtended) raisedCount++;
                if (ringExtended) raisedCount++;
                if (pinkyExtended) raisedCount++;

                // Function to verify if a single hand is in a "half-heart" C-shape claw posture
                function checkHalfHeart(hand, pLength) {
                    const thumbIndexD = calculateDistance(hand[4], hand[8]) / pLength;
                    
                    const iRatio = calculateDistance(hand[8], hand[5]) / pLength;
                    const tRatio = calculateDistance(hand[4], hand[2]) / pLength;

                    // Index is arched (forming the top half-curve)
                    const indexArched = iRatio > 0.32 && iRatio < 0.88;
                    // Thumb is extended/arched (forming the bottom half-curve)
                    const thumbArched = tRatio > 0.35;
                    
                    // The other three fingers are curled into the palm
                    const mD = calculateDistance(hand[0], hand[12]);
                    const rD = calculateDistance(hand[0], hand[16]);
                    const pD = calculateDistance(hand[0], hand[20]);
                    const mExtended = (mD / pLength) > ratioThreshold;
                    const rExtended = (rD / pLength) > ratioThreshold;
                    const pExtended = (pD / pLength) > ratioThreshold;
                    const otherCurled = !mExtended && !rExtended && !pExtended;

                    return (thumbIndexD > 0.65 && thumbIndexD < 2.0) && indexArched && !isFingerStraight(hand, 5, 6, 7, 8) && thumbArched && otherCurled;
                }

                // Function to verify if a single hand is in a crossover finger-heart (比心) posture
                function checkCrossoverFingerHeart(hand, pLength) {
                    // Local up axis: wrist (0) to middle MCP (9)
                    const vUpX = hand[9].x - hand[0].x;
                    const vUpY = hand[9].y - hand[0].y;
                    const vUpZ = hand[9].z - hand[0].z;
                    const lenUp = Math.sqrt(vUpX * vUpX + vUpY * vUpY + vUpZ * vUpZ) || 1;
                    const uUp = { x: vUpX / lenUp, y: vUpY / lenUp, z: vUpZ / lenUp };

                    // Local thumb-ward axis: pinky MCP (17) to index MCP (5)
                    const vThumbX = hand[5].x - hand[17].x;
                    const vThumbY = hand[5].y - hand[17].y;
                    const vThumbZ = hand[5].z - hand[17].z;
                    const lenThumb = Math.sqrt(vThumbX * vThumbX + vThumbY * vThumbY + vThumbZ * vThumbZ) || 1;
                    const uThumb = { x: vThumbX / lenThumb, y: vThumbY / lenThumb, z: vThumbZ / lenThumb };

                    // Vector from index tip (8) to thumb tip (4)
                    const v8to4X = hand[4].x - hand[8].x;
                    const v8to4Y = hand[4].y - hand[8].y;
                    const v8to4Z = hand[4].z - hand[8].z;

                    const dotUp = v8to4X * uUp.x + v8to4Y * uUp.y + v8to4Z * uUp.z;
                    const dotThumb = v8to4X * uThumb.x + v8to4Y * uThumb.y + v8to4Z * uThumb.z;

                    const ratioUp = dotUp / pLength;
                    const ratioThumb = dotThumb / pLength;

                    const thumbIndexD = calculateDistance(hand[4], hand[8]);
                    const thumbIndexDRatio = thumbIndexD / pLength;

                    const mD = calculateDistance(hand[0], hand[12]);
                    const rD = calculateDistance(hand[0], hand[16]);
                    const pD = calculateDistance(hand[0], hand[20]);

                    const mExtended = (mD / pLength) > ratioThreshold;
                    const rExtended = (rD / pLength) > ratioThreshold;
                    const pExtended = (pD / pLength) > ratioThreshold;

                    // Relaxed crossover checks to allow easy trigger under varying angles
                    const isCrossover = (ratioUp > -0.15) && (ratioThumb < 0.15);
                    return (thumbIndexDRatio < 0.38) && isCrossover && (!mExtended && !rExtended && !pExtended);
                }

                // Function to verify if a hand is in an upside-down claw-shape (倒着呈爪形)
                function checkUpsideDownClaw(hand, pLength) {
                    // 1. Check if all 5 fingers are pointing downwards (tips are below MCP joints in screen Y)
                    const indexDownward = hand[8].y > hand[5].y;
                    const middleDownward = hand[12].y > hand[9].y;
                    const ringDownward = hand[16].y > hand[13].y;
                    const pinkyDownward = hand[20].y > hand[17].y;
                    const thumbDownward = hand[4].y > hand[2].y;
                    
                    const allDownward = indexDownward && middleDownward && ringDownward && pinkyDownward && thumbDownward;
                    if (!allDownward) return false;
                    
                    // 2. Check if it is a claw shape (fingers are curved, not straight)
                    const indexStraight = isFingerStraight(hand, 5, 6, 7, 8);
                    const middleStraight = isFingerStraight(hand, 9, 10, 11, 12);
                    const ringStraight = isFingerStraight(hand, 13, 14, 15, 16);
                    const pinkyStraight = isFingerStraight(hand, 17, 18, 19, 20);
                    
                    const straightCount = [indexStraight, middleStraight, ringStraight, pinkyStraight].filter(Boolean).length;
                    // If at least 2 of the 4 fingers are curved, we classify it as a claw shape
                    return straightCount <= 2;
                }

                // Compute thumb-index distance ratio for C-shape claw detection
                const primaryThumbIndexD = calculateDistance(primaryHand[4], primaryHand[8]) / palmLength;

                // Check single-hand half-heart or crossover finger-heart on the primary hand, 
                // or if the primary hand is fully curled/fist (raisedCount === 0)
                // OR if it forms a C-shape claw (small thumb-index distance and index is curved)
                let isFingerHeart = checkHalfHeart(primaryHand, palmLength) || 
                                    checkCrossoverFingerHeart(primaryHand, palmLength) ||
                                    checkUpsideDownClaw(primaryHand, palmLength) ||
                                    (raisedCount === 0) ||
                                    (primaryThumbIndexD < 1.15 && !indexExtended);

                // Check secondary hand half-heart or dual-hand joined heart if present
                if (secondaryHand && secondaryHand.length >= 21) {
                    const palmLengthSec = calculateDistance(secondaryHand[0], secondaryHand[9]);
                    if (palmLengthSec > 0.01) {
                        // Check if either hand is in a half-heart or crossover posture, or if the second hand is a fist/curled
                        const secondaryIndexDist = calculateDistance(secondaryHand[0], secondaryHand[8]);
                        const secondaryIndexExtended = (secondaryIndexDist / palmLengthSec > ratioThreshold) || isFingerStraight(secondaryHand, 5, 6, 7, 8);

                        const raisedCountSec = [
                            secondaryIndexExtended,
                            (calculateDistance(secondaryHand[0], secondaryHand[12]) / palmLengthSec > ratioThreshold) || isFingerStraight(secondaryHand, 9, 10, 11, 12),
                            (calculateDistance(secondaryHand[0], secondaryHand[16]) / palmLengthSec > ratioThreshold) || isFingerStraight(secondaryHand, 13, 14, 15, 16),
                            (calculateDistance(secondaryHand[0], secondaryHand[20]) / palmLengthSec > ratioThreshold) || isFingerStraight(secondaryHand, 17, 18, 19, 20)
                        ].filter(Boolean).length;

                        const secondaryThumbIndexD = calculateDistance(secondaryHand[4], secondaryHand[8]) / palmLengthSec;

                        if (checkHalfHeart(secondaryHand, palmLengthSec) || 
                            checkCrossoverFingerHeart(secondaryHand, palmLengthSec) ||
                            checkUpsideDownClaw(secondaryHand, palmLengthSec) ||
                            (raisedCountSec === 0) ||
                            (secondaryThumbIndexD < 1.15 && !secondaryIndexExtended)) {
                            isFingerHeart = true;
                        }

                        // Check dual-hand joined heart (fingertips of index and thumb touch, middle fingers apart)
                        const avgPalmLength = (palmLength + palmLengthSec) / 2;
                        const indexTipsDist = calculateDistance(primaryHand[8], secondaryHand[8]) / avgPalmLength;
                        const thumbTipsDist = calculateDistance(primaryHand[4], secondaryHand[4]) / avgPalmLength;
                        const middleTipsDist = calculateDistance(primaryHand[12], secondaryHand[12]) / avgPalmLength;

                        if (indexTipsDist < 0.65 && thumbTipsDist < 0.65 && middleTipsDist > 0.45) {
                            isFingerHeart = true;
                        }
                    }
                }

                // If shape is locked during pinch interaction, do not switch shapes,
                // EXCEPT if the user is making a heart gesture!
                if (shapeLocked && !isFingerHeart) {
                    gestureHistory = [];
                    return;
                }

                let targetGestureShape = null;
                if (isFingerHeart) {
                    targetGestureShape = 'heart';
                } else if (raisedCount === 1 && indexExtended) {
                    targetGestureShape = 'sphere';
                } else if (raisedCount === 2 && indexExtended && middleExtended) {
                    targetGestureShape = 'galaxy';
                } else if (raisedCount === 3 && indexExtended && middleExtended && ringExtended) {
                    targetGestureShape = 'saturn';
                } else if (raisedCount === 4 && indexExtended && middleExtended && ringExtended && pinkyExtended) {
                    // Check if thumb is also extended (5 fingers open palm -> Leaf, 4 fingers -> Lotus)
                    const thumbExtended = (calculateDistance(primaryHand[4], primaryHand[5]) / palmLength) > 0.58;
                    if (thumbExtended) {
                        targetGestureShape = 'leaf';
                    } else {
                        targetGestureShape = 'lotus';
                    }
                } else if (raisedCount === 0) {
                    targetGestureShape = 'heart'; // Fist also maps to heart
                }

                if (targetGestureShape) {
                    gestureHistory.push(targetGestureShape);
                    if (gestureHistory.length > GESTURE_HISTORY_LIMIT) {
                        gestureHistory.shift();
                    }

                    // Count frequencies in voting window
                    const counts = {};
                    let maxCount = 0;
                    let mostFrequentShape = null;

                    for (const shape of gestureHistory) {
                        counts[shape] = (counts[shape] || 0) + 1;
                        if (counts[shape] > maxCount) {
                            maxCount = counts[shape];
                            mostFrequentShape = shape;
                        }
                    }

                    // Set target shape if it meets the voting threshold and is different
                    if (maxCount >= GESTURE_VOTE_THRESHOLD && mostFrequentShape !== targetShape) {
                        setTargetShape(mostFrequentShape);
                        gestureHistory = []; // Clear voting history on switch
                    }
                } else {
                    if (gestureHistory.length > 0) {
                        gestureHistory.shift();
                    }
                }
            }
            
            // Detect if a point is inside/near the sphere
            function isPointInSphere(point) {
                // Convert normalized coordinates to world space
                const worldX = (point.x - 0.5) * 10;
                const worldY = (0.5 - point.y) * 10; // Invert Y to match Three.js coordinate system
                const worldZ = 0; // Assume point is on Z=0 plane
                
                // Get sphere position in world space
                const spherePos = new THREE.Vector3();
                sphere.getWorldPosition(spherePos);
                
                // Calculate distance between point and sphere center
                const distance = Math.sqrt(
                    Math.pow(worldX - spherePos.x, 2) + 
                    Math.pow(worldY - spherePos.y, 2) + 
                    Math.pow(worldZ - spherePos.z, 2)
                );
                
                // Consider interaction if point is within or near the sphere surface
                // Using the current sphere size for detection
                const currentSize = sphere.scale.x * 2;
                return distance < currentSize * 1; // Add some buffer for easier interaction
            }
            
            // Initialize MediaPipe Hands
            async function initMediaPipeHands() {
                if (controlState.source !== 'browser') {
                    return null;
                }

                statusElement.textContent = 'Initializing MediaPipe Hands...';
                
                const hands = new Hands({
                    locateFile: (file) => {
                        return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
                    }
                });
                
                hands.setOptions({
                    maxNumHands: 2,
                    modelComplexity: 1,
                    minDetectionConfidence: 0.5,
                    minTrackingConfidence: 0.5
                });
                
                await hands.initialize();
                if (controlState.source === 'browser') {
                    statusElement.textContent = 'Hand tracking ready!';
                }
                
                return hands;
            }
            
            // Draw hand landmarks on canvas with dynamic sizing
            function drawLandmarks(landmarks, isLeft) {
                // Adjust line width and point size based on screen dimension
                const screenSize = Math.min(window.innerWidth, window.innerHeight);
                const lineWidth = Math.max(2, Math.min(5, screenSize / 300));
                const pointSize = Math.max(2, Math.min(8, screenSize / 250));
                
                // Define connections between landmarks
                const connections = [
                    // Thumb
                    [0, 1], [1, 2], [2, 3], [3, 4],
                    // Index finger
                    [0, 5], [5, 6], [6, 7], [7, 8],
                    // Middle finger
                    [0, 9], [9, 10], [10, 11], [11, 12],
                    // Ring finger
                    [0, 13], [13, 14], [14, 15], [15, 16],
                    // Pinky
                    [0, 17], [17, 18], [18, 19], [19, 20],
                    // Palm
                    [0, 5], [5, 9], [9, 13], [13, 17]
                ];
                
                // Choose a different color for each hand
                const handColor = isLeft ? '#00FF00' : '#00FFFF';
                
                // Draw connections
                canvasCtx.lineWidth = lineWidth;
                canvasCtx.strokeStyle = handColor;
                
                connections.forEach(([i, j]) => {
                    const start = landmarks[i];
                    const end = landmarks[j];
                    
                    canvasCtx.beginPath();
                    canvasCtx.moveTo(start.x * canvasElement.width, start.y * canvasElement.height);
                    canvasCtx.lineTo(end.x * canvasElement.width, end.y * canvasElement.height);
                    canvasCtx.stroke();
                });
                
                // Draw landmarks
                landmarks.forEach((landmark, index) => {
                    // Special color for thumb tip (index 4) and index finger tip (index 8)
                    let pointColor = handColor;
                    if (index === 4 || index === 8) {
                        pointColor = '#FF0000';
                    }
                    
                    canvasCtx.fillStyle = pointColor;
                    canvasCtx.beginPath();
                    canvasCtx.arc(
                        landmark.x * canvasElement.width,
                        landmark.y * canvasElement.height,
                        pointSize * 1.2,  // Make thumb and index fingertips slightly larger
                        0,
                        2 * Math.PI
                    );
                    canvasCtx.fill();
                });
            }

            function getRaspberryVideoRect() {
                const canvasWidth = canvasElement.width || window.innerWidth;
                const canvasHeight = canvasElement.height || window.innerHeight;
                const videoWidth = raspberryVideoElement.naturalWidth || 4;
                const videoHeight = raspberryVideoElement.naturalHeight || 3;
                const videoRatio = videoWidth / videoHeight;
                const canvasRatio = canvasWidth / canvasHeight;

                if (canvasRatio > videoRatio) {
                    const height = canvasHeight;
                    const width = height * videoRatio;
                    return {
                        x: (canvasWidth - width) / 2,
                        y: 0,
                        width,
                        height,
                    };
                }

                const width = canvasWidth;
                const height = width / videoRatio;
                return {
                    x: 0,
                    y: (canvasHeight - height) / 2,
                    width,
                    height,
                };
            }

            function drawRaspberryLandmarks() {
                if (controlState.source !== 'raspberry') {
                    return;
                }

                canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
                if (!controlState.handDetected || controlState.landmarks.length < 21) {
                    return;
                }

                const rect = getRaspberryVideoRect();
                const connections = [
                    [0, 1], [1, 2], [2, 3], [3, 4],
                    [0, 5], [5, 6], [6, 7], [7, 8],
                    [0, 9], [9, 10], [10, 11], [11, 12],
                    [0, 13], [13, 14], [14, 15], [15, 16],
                    [0, 17], [17, 18], [18, 19], [19, 20],
                    [5, 9], [9, 13], [13, 17],
                ];
                const toCanvasPoint = (point) => ({
                    x: rect.x + point.x * rect.width,
                    y: rect.y + point.y * rect.height,
                });

                canvasCtx.save();
                canvasCtx.lineWidth = 3;
                canvasCtx.strokeStyle = 'rgba(0, 255, 255, 0.95)';
                connections.forEach(([startIndex, endIndex]) => {
                    const start = controlState.landmarks[startIndex];
                    const end = controlState.landmarks[endIndex];
                    if (!start || !end) {
                        return;
                    }
                    const startPoint = toCanvasPoint(start);
                    const endPoint = toCanvasPoint(end);
                    canvasCtx.beginPath();
                    canvasCtx.moveTo(startPoint.x, startPoint.y);
                    canvasCtx.lineTo(endPoint.x, endPoint.y);
                    canvasCtx.stroke();
                });

                controlState.landmarks.forEach((landmark, index) => {
                    const point = toCanvasPoint(landmark);
                    const isPinchTip = index === 4 || index === 8;
                    canvasCtx.fillStyle = isPinchTip ? '#ff3b30' : '#39ff14';
                    canvasCtx.beginPath();
                    canvasCtx.arc(point.x, point.y, isPinchTip ? 7 : 5, 0, Math.PI * 2);
                    canvasCtx.fill();
                });
                canvasCtx.restore();
            }
               // Process video frames
            function onResults(results) {
                if (controlState.source !== 'browser' || !browserCameraRunning) {
                    return;
                }

                // Clear canvas
                canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
                
                // Make sure canvas size matches window
                if (canvasElement.width !== window.innerWidth || 
                    canvasElement.height !== window.innerHeight) {
                    updateCanvasSize();
                }
                
                rightHandActive = false;
                leftHandActive = false;
                
                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    controlState.handDetected = true;
                    
                    // State-machine for locking shape selection during pinch interaction
                    const primaryHand = results.multiHandLandmarks[0];
                    controlState.landmarks = primaryHand;
                    controlState.landmarkCount = primaryHand.length;
                    
                    const pPinch = calculateDistance(primaryHand[4], primaryHand[8]);
                    if (pPinch < 0.08) {
                        shapeLocked = true;
                    } else if (pPinch > 0.16) {
                        shapeLocked = false;
                    }
                    
                    const secondaryHand = results.multiHandLandmarks[1] || null;
                    processShapeSwitchingGestures(primaryHand, secondaryHand);
                    
                    const numHands = results.multiHandLandmarks.length;
                    statusElement.textContent = numHands === 1 ? '1 hand detected (Single hand mode)' : `${numHands} hands detected (Dual hand mode)`;
                    
                    if (numHands === 1) {
                        // SINGLE HAND MODE: This hand does EVERYTHING (scale + rotate + touch color)
                        const landmarks = results.multiHandLandmarks[0];
                        const handedness = results.multiHandedness[0].label;
                        const isLeft = handedness === 'Left';
                        
                        // Draw hand
                        drawLandmarks(landmarks, isLeft);
                        
                        // 1. Rotation control
                        const handRotation = calculateHandRotation(landmarks);
                        controlState.handRotX = handRotation.x;
                        controlState.handRotY = handRotation.y;
                        controlState.handRotZ = handRotation.z;
                        
                        // 2. Pinch scale control
                        const thumbTip = landmarks[4];
                        const indexTip = landmarks[8];
                        const pinchDistance = calculateDistance(thumbTip, indexTip);
                        
                        controlState.pinchDistance = pinchDistance;
                        controlState.targetScale = mapPinchDistanceToScale(pinchDistance);
                        controlState.motion = true;
                        controlState.area = pinchDistance * 100000;
                        controlState.gesture = isLeft ? 'left_hand_pinch' : 'right_hand_pinch';
                        controlState.lastMessageAt = Date.now();
                        
                        // 3. Track speed for turbulence using middle finger MCP (landmark 9)
                        const wrist = landmarks[9];
                        if (prevHandX !== null && prevHandY !== null) {
                            const dx = wrist.x - prevHandX;
                            const dy = wrist.y - prevHandY;
                            const dist = Math.sqrt(dx * dx + dy * dy);
                            targetTurbulence = Math.min(1.0, dist * 16.0);
                        }
                        prevHandX = wrist.x;
                        prevHandY = wrist.y;

                        // 4. Touch color trigger
                        if (isPointInSphere(indexTip)) {
                            const currentTime = Date.now();
                            if (currentTime - lastColorChangeTime > colorChangeDelay) {
                                const newColor = getRandomNeonColor();
                                if (solidMesh && solidMesh.material) {
                                    solidMesh.material.color.setHex(newColor);
                                }
                                lastColorChangeTime = currentTime;
                            }
                        }
                    } else {
                        // DUAL HAND MODE: Right and Left hands
                        let rightHandLandmarks = null;
                        let leftHandLandmarks = null;
                        
                        for (let i = 0; i < numHands; i++) {
                            const landmarks = results.multiHandLandmarks[i];
                            const handedness = results.multiHandedness[i].label;
                            const isLeft = handedness === 'Left';
                            
                            drawLandmarks(landmarks, isLeft);
                            
                            if (!isLeft) {
                                rightHandLandmarks = landmarks;
                            } else {
                                leftHandLandmarks = landmarks;
                            }
                        }
                        
                        if (rightHandLandmarks && leftHandLandmarks) {
                            // DUAL HANDS DETECTED: use the distance between the two hands for scaling/diffusion!
                            const leftCenter = leftHandLandmarks[9];
                            const rightCenter = rightHandLandmarks[9];
                            const handDistance = calculateDistance(leftCenter, rightCenter);
                            
                            controlState.targetScale = mapDualHandDistanceToScale(handDistance);
                            controlState.pinchDistance = handDistance;
                            controlState.gesture = 'dual_hand_stretch';
                            controlState.motion = true;
                            controlState.lastMessageAt = Date.now();
                            
                            // Rotate based on right hand
                            const handRotation = calculateHandRotation(rightHandLandmarks);
                            controlState.handRotX = handRotation.x;
                            controlState.handRotY = handRotation.y;
                            controlState.handRotZ = handRotation.z;
                            
                            // Track speed of right hand for turbulence
                            const wrist = rightHandLandmarks[9];
                            if (prevHandX !== null && prevHandY !== null) {
                                const dx = wrist.x - prevHandX;
                                const dy = wrist.y - prevHandY;
                                const dist = Math.sqrt(dx * dx + dy * dy);
                                targetTurbulence = Math.min(1.0, dist * 16.0);
                            }
                            prevHandX = wrist.x;
                            prevHandY = wrist.y;
                            rightHandActive = true;
                            leftHandActive = true;
                        } else if (rightHandLandmarks) {
                            // Only Right hand
                            const handRotation = calculateHandRotation(rightHandLandmarks);
                            controlState.handRotX = handRotation.x;
                            controlState.handRotY = handRotation.y;
                            controlState.handRotZ = handRotation.z;
                            
                            const thumbTip = rightHandLandmarks[4];
                            const indexTip = rightHandLandmarks[8];
                            const pinchDistance = calculateDistance(thumbTip, indexTip);
                            
                            controlState.targetScale = mapPinchDistanceToScale(pinchDistance);
                            controlState.pinchDistance = pinchDistance;
                            controlState.motion = true;
                            controlState.area = pinchDistance * 100000;
                            controlState.gesture = 'right_hand_pinch';
                            controlState.lastMessageAt = Date.now();
                            
                            // Track speed
                            const wrist = rightHandLandmarks[9];
                            if (prevHandX !== null && prevHandY !== null) {
                                const dx = wrist.x - prevHandX;
                                const dy = wrist.y - prevHandY;
                                const dist = Math.sqrt(dx * dx + dy * dy);
                                targetTurbulence = Math.min(1.0, dist * 16.0);
                            }
                            prevHandX = wrist.x;
                            prevHandY = wrist.y;
                            rightHandActive = true;
                        } else if (leftHandLandmarks) {
                            // Only Left hand
                            const handRotation = calculateHandRotation(leftHandLandmarks);
                            controlState.handRotX = handRotation.x;
                            controlState.handRotY = handRotation.y;
                            controlState.handRotZ = handRotation.z;
                            
                            const thumbTip = leftHandLandmarks[4];
                            const indexTip = leftHandLandmarks[8];
                            const pinchDistance = calculateDistance(thumbTip, indexTip);
                            
                            controlState.targetScale = mapPinchDistanceToScale(pinchDistance);
                            controlState.pinchDistance = pinchDistance;
                            controlState.motion = true;
                            controlState.area = pinchDistance * 100000;
                            controlState.gesture = 'left_hand_pinch';
                            controlState.lastMessageAt = Date.now();
                            
                            // Track speed
                            const wrist = leftHandLandmarks[9];
                            if (prevHandX !== null && prevHandY !== null) {
                                const dx = wrist.x - prevHandX;
                                const dy = wrist.y - prevHandY;
                                const dist = Math.sqrt(dx * dx + dy * dy);
                                targetTurbulence = Math.min(1.0, dist * 16.0);
                            }
                            prevHandX = wrist.x;
                            prevHandY = wrist.y;
                            leftHandActive = true;
                        }
                    }
                } else {
                    statusElement.textContent = 'No hands detected';
                    controlState.handDetected = false;
                    prevHandX = null;
                    prevHandY = null;
                }
            }
            
            // Initialize and start the app
            async function startApp() {
                try {
                    initThreeJS(); // Initialize Three.js
                    await setMode('browser');

                } catch (error) {
                    if (controlState.source === 'browser') {
                        statusElement.textContent = `Browser camera unavailable: ${error.message}`;
                    }
                    console.error('Error starting application:', error);
                }
            }
            
            // Start the application
            startApp();
        });
    </script>
</body>
