<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hand Tracking Demo with Three.js</title>
    <script defer src="https://cloud.umami.is/script.js" data-website-id="eb59c81c-27cb-4e1d-9e8c-bfbe70c48cd9"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000;
        }
        
        .container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        #webcam {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* Mirror the webcam feed */
            z-index: 0;
        }

        #raspberry-video {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: center center;
            display: none;
            background: #000;
            opacity: 0.62;
            z-index: 0;
            pointer-events: none;
        }
        
        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: scaleX(-1); /* Mirror the canvas to match webcam */
            pointer-events: none;
            z-index: 6;
        }
        
        #three-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }
        
        #status {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            background-color: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 5px;
            font-family: Arial, sans-serif;
            z-index: 10;
        }

        #control-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            width: min(320px, calc(100vw - 40px));
            color: #fff;
            background-color: rgba(0, 0, 0, 0.55);
            padding: 12px;
            border-radius: 6px;
            font-family: Arial, sans-serif;
            font-size: 14px;
            z-index: 10;
        }

        .mode-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            margin-bottom: 8px;
        }

        .control-mode-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            margin: 8px 0;
        }

        .mode-buttons button,
        .control-mode-buttons button,
        #connect-raspberry {
            min-height: 34px;
            border: 1px solid rgba(255, 255, 255, 0.35);
            border-radius: 4px;
            color: #fff;
            background: rgba(255, 255, 255, 0.12);
            cursor: pointer;
        }

        .mode-buttons button.active {
            color: #000;
            background: #00ffff;
            border-color: #00ffff;
        }

        .control-mode-buttons button.active {
            color: #000;
            background: #39ff14;
            border-color: #39ff14;
        }

        #ws-url,
        #mjpeg-url {
            box-sizing: border-box;
            width: 100%;
            height: 34px;
            margin-bottom: 6px;
            border: 1px solid rgba(255, 255, 255, 0.35);
            border-radius: 4px;
            color: #fff;
            background: rgba(0, 0, 0, 0.35);
            padding: 0 8px;
        }

        #control-readout {
            margin-top: 8px;
            line-height: 1.5;
            color: rgba(255, 255, 255, 0.9);
        }

        #links-para{
            position: absolute;
            bottom: 5px;
            left: 5px;
            font-family: Helvetica, sans-serif;
            font-size: 16px;
            background-color: rgba(255, 255, 255, 0.5);
            padding: 10px;
        }

        a {
            color: #0000FF !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <video id="webcam" autoplay playsinline></video>
        <img id="raspberry-video" alt="">
        <canvas id="canvas"></canvas>
        <div id="three-canvas"></div>
        <div id="status">Loading MediaPipe...</div>
        <div id="control-panel">
            <div class="mode-buttons">
                <button type="button" data-mode="browser" class="active">Browser</button>
                <button type="button" data-mode="raspberry">Raspberry</button>
                <button type="button" data-mode="simulate">Simulate</button>
            </div>
            <input id="ws-url" value="ws://10.196.36.213:8765" aria-label="WebSocket URL">
            <input id="mjpeg-url" value="http://10.196.36.213:8080/video" aria-label="MJPEG URL">
            <button id="connect-raspberry" type="button">Connect</button>
            <div class="control-mode-buttons">
                <button type="button" data-control-mode="area" class="active">Area</button>
                <button type="button" data-control-mode="pinch">Pinch</button>
                <button type="button" data-control-mode="hybrid">Hybrid</button>
            </div>
            <div id="control-readout"></div>
        </div>
    </div>

    <p id="links-para"><a href="https://x.com/measure_plan" target="_blank">Twitter</a> | <a href="https://www.instagram.com/stereo.drift/" target="_blank">Instagram</a> | <a href="https://github.com/collidingScopes/threejs-handtracking-101" target="_blank">Source Code</a> | <a href="https://buymeacoffee.com/stereodrift" target="_blank">❤️</a></p>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const videoElement = document.getElementById('webcam');
            const raspberryVideoElement = document.getElementById('raspberry-video');
            const canvasElement = document.getElementById('canvas');
            const canvasCtx = canvasElement.getContext('2d');
            const statusElement = document.getElementById('status');
            const threeContainer = document.getElementById('three-canvas');
            const controlReadout = document.getElementById('control-readout');
            const wsUrlInput = document.getElementById('ws-url');
            const mjpegUrlInput = document.getElementById('mjpeg-url');
            const connectButton = document.getElementById('connect-raspberry');
            const modeButtons = document.querySelectorAll('[data-mode]');
            const controlModeButtons = document.querySelectorAll('[data-control-mode]');
            
            // Three.js variables
            let scene, camera, renderer;
            let sphere, solidMesh, wireframeMesh, particleMesh, particleMaterial;
            let particleBasePositions = null;
            let particlePhases = null;
            
            // Hand tracking variables
            let rightHandActive = false;
            let leftHandActive = false;
            let lastColorChangeTime = 0;
            const colorChangeDelay = 500; // milliseconds
            let currentSphereSize = 1.0; // Default/starting size
            const smoothingFactor = 0.15; // Adjust this value between 0-1 (lower = smoother but slower)
            let raspberrySocket = null;
            let simulationTimer = null;
            let mediaPipeHands = null;
            let mediaPipeCamera = null;
            let browserCameraRunning = false;
            let browserStartToken = 0;

            const controlState = {
                source: 'browser',
                targetScale: 1.0,
                rotateX: 0,
                rotateY: 0,
                motion: false,
                area: 0,
                gesture: 'none',
                handDetected: false,
                landmarkCount: 0,
                pinchDistance: 0,
                landmarks: [],
                controlMode: 'area',
                connected: false,
                lastMessageAt: 0
            };

            function clamp(value, min, max) {
                return Math.min(Math.max(value, min), max);
            }

            function mapPinchDistanceToScale(pinchDistance) {
                if (pinchDistance < 0.05) {
                    return 0.6;
                }
                if (pinchDistance > 0.25) {
                    return 2.0;
                }
                return 0.6 + (pinchDistance - 0.05) * (2.0 - 0.6) / (0.25 - 0.05);
            }

            function updateControlReadout() {
                const connectedText = controlState.connected ? 'yes' : 'no';
                const messageAge = controlState.lastMessageAt
                    ? `${((Date.now() - controlState.lastMessageAt) / 1000).toFixed(1)}s`
                    : '-';

                controlReadout.innerHTML = [
                    `source: ${controlState.source}`,
                    `control: ${controlState.controlMode}`,
                    `targetScale: ${controlState.targetScale.toFixed(2)}`,
                    `currentScale: ${currentSphereSize.toFixed(2)}`,
                    `motion: ${controlState.motion}`,
                    `area: ${Math.round(controlState.area)}`,
                    `hand: ${controlState.handDetected}`,
                    `landmarks: ${controlState.landmarkCount}`,
                    `pinch: ${controlState.pinchDistance.toFixed(3)}`,
                    `ws connected: ${connectedText}`,
                    `last message: ${messageAge}`
                ].join('<br>');
            }

            async function setMode(mode) {
                controlState.source = mode;
                modeButtons.forEach((button) => {
                    button.classList.toggle('active', button.dataset.mode === mode);
                });

                if (mode === 'browser') {
                    stopSimulation();
                    disconnectRaspberrySocket();
                    stopRaspberryVideo();
                    await startBrowserCamera();
                } else {
                    stopBrowserCamera();
                }

                if (mode === 'simulate') {
                    disconnectRaspberrySocket();
                    startSimulation();
                }
                if (mode !== 'simulate') {
                    stopSimulation();
                }

                if (mode === 'raspberry') {
                    canvasElement.style.display = 'block';
                    canvasElement.style.transform = 'none';
                    startRaspberryVideo();
                    statusElement.textContent = 'Raspberry mode ready';
                }
            }

            function setControlMode(mode) {
                controlState.controlMode = mode;
                controlModeButtons.forEach((button) => {
                    button.classList.toggle('active', button.dataset.controlMode === mode);
                });
            }

            function applyRaspberryControl(data) {
                controlState.source = 'raspberry';
                const areaScale = clamp(Number(data.scale ?? controlState.targetScale), 0.6, 2.5);
                const pinchDistance = Number(data.pinchDistance ?? 0);
                const pinchScale = clamp(mapPinchDistanceToScale(pinchDistance), 0.6, 2.5);
                controlState.rotateX = Number(data.rotateX ?? 0);
                controlState.rotateY = Number(data.rotateY ?? 0);
                controlState.motion = Boolean(data.motion);
                controlState.area = Number(data.area ?? 0);
                controlState.gesture = data.gesture || 'single_hand_area';
                controlState.handDetected = Boolean(data.handDetected);
                controlState.landmarkCount = Number(data.landmarkCount ?? 0);
                controlState.pinchDistance = pinchDistance;
                controlState.landmarks = Array.isArray(data.landmarks) ? data.landmarks : [];
                if (controlState.controlMode === 'pinch') {
                    if (controlState.handDetected && controlState.landmarkCount >= 9) {
                        controlState.targetScale = pinchScale;
                    }
                } else if (controlState.controlMode === 'hybrid') {
                    controlState.targetScale = controlState.handDetected && controlState.landmarkCount >= 9
                        ? pinchScale
                        : areaScale;
                } else {
                    controlState.targetScale = areaScale;
                }
                controlState.lastMessageAt = Date.now();
                drawRaspberryLandmarks();
            }

            function connectRaspberrySocket() {
                if (raspberrySocket) {
                    raspberrySocket.close();
                    raspberrySocket = null;
                }

                setMode('raspberry');
                const socket = new WebSocket(wsUrlInput.value);
                raspberrySocket = socket;
                statusElement.textContent = 'Connecting to Raspberry Pi...';

                socket.addEventListener('open', () => {
                    if (raspberrySocket !== socket || controlState.source !== 'raspberry') {
                        return;
                    }
                    controlState.connected = true;
                    statusElement.textContent = 'Raspberry Pi connected';
                });

                socket.addEventListener('message', (event) => {
                    if (raspberrySocket !== socket || controlState.source !== 'raspberry') {
                        return;
                    }

                    try {
                        applyRaspberryControl(JSON.parse(event.data));
                    } catch (error) {
                        console.error('Invalid Raspberry Pi message:', event.data, error);
                    }
                });

                socket.addEventListener('close', () => {
                    if (raspberrySocket !== socket) {
                        return;
                    }

                    controlState.connected = false;
                    if (controlState.source === 'raspberry') {
                        statusElement.textContent = 'Raspberry Pi disconnected';
                    }
                });

                socket.addEventListener('error', () => {
                    if (raspberrySocket !== socket) {
                        return;
                    }

                    controlState.connected = false;
                    if (controlState.source === 'raspberry') {
                        statusElement.textContent = 'Raspberry Pi connection error';
                    }
                });
            }

            function disconnectRaspberrySocket() {
                if (!raspberrySocket) {
                    controlState.connected = false;
                    return;
                }

                raspberrySocket.close();
                raspberrySocket = null;
                controlState.connected = false;
            }

            function startRaspberryVideo() {
                raspberryVideoElement.src = '';
                raspberryVideoElement.style.display = 'block';
                raspberryVideoElement.src = mjpegUrlInput.value;
            }

            function stopRaspberryVideo() {
                raspberryVideoElement.removeAttribute('src');
                raspberryVideoElement.src = '';
                raspberryVideoElement.style.display = 'none';
                canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            }

            function startSimulation() {
                stopSimulation();
                stopRaspberryVideo();
                let phase = 0;
                simulationTimer = window.setInterval(() => {
                    phase += 0.12;
                    controlState.targetScale = 1.1 + Math.sin(phase) * 0.8;
                    controlState.rotateY = Math.cos(phase) * 0.01;
                    controlState.motion = true;
                    controlState.area = 8000 + Math.max(0, Math.sin(phase)) * 12000;
                    controlState.gesture = 'simulated_single_hand_area';
                    controlState.lastMessageAt = Date.now();
                    statusElement.textContent = 'Simulation mode';
                }, 60);
            }

            function stopSimulation() {
                if (simulationTimer) {
                    window.clearInterval(simulationTimer);
                    simulationTimer = null;
                }
            }

            modeButtons.forEach((button) => {
                button.addEventListener('click', () => setMode(button.dataset.mode));
            });
            controlModeButtons.forEach((button) => {
                button.addEventListener('click', () => setControlMode(button.dataset.controlMode));
            });
            connectButton.addEventListener('click', connectRaspberrySocket);
            window.addEventListener('pagehide', () => {
                disconnectRaspberrySocket();
                stopRaspberryVideo();
            });
            window.addEventListener('beforeunload', () => {
                disconnectRaspberrySocket();
                stopRaspberryVideo();
            });

            // Keep canvas size in sync with window size
            function updateCanvasSize() {
                canvasElement.width = window.innerWidth;
                canvasElement.height = window.innerHeight;
            }
            
            // Initialize and properly set element sizes
            function initializeLayout() {
                updateCanvasSize();
            }
            
            // Update layout when window is resized
            window.addEventListener('resize', () => {
                initializeLayout();
                if (renderer) {
                    renderer.setSize(window.innerWidth, window.innerHeight);
                }
                if (camera) {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                }
                if (controlState.source === 'raspberry') {
                    drawRaspberryLandmarks();
                }
            });
            
            // Set initial layout
            initializeLayout();
            
            async function startBrowserCamera() {
                const startToken = ++browserStartToken;
                videoElement.style.display = 'block';
                canvasElement.style.display = 'block';
                canvasElement.style.transform = 'scaleX(-1)';
                statusElement.textContent = 'Starting browser camera...';

                try {
                    // Try to get a high resolution stream
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: {
                            width: { ideal: 1920 },
                            height: { ideal: 1080 },
                            facingMode: 'user'
                        }
                    });

                    if (startToken !== browserStartToken || controlState.source !== 'browser') {
                        stream.getTracks().forEach((track) => track.stop());
                        return;
                    }
                    
                    videoElement.srcObject = stream;
                    
                    await new Promise((resolve) => {
                        videoElement.onloadedmetadata = () => {
                            // Ensure layout is updated when video loads
                            initializeLayout();
                            resolve(videoElement);
                        };
                    });

                    if (startToken !== browserStartToken || controlState.source !== 'browser') {
                        stopBrowserCamera();
                        return;
                    }

                    if (!mediaPipeHands) {
                        const hands = await initMediaPipeHands();
                        if (!hands) {
                            return;
                        }
                        mediaPipeHands = hands;
                        mediaPipeHands.onResults(onResults);
                    }

                    if (startToken !== browserStartToken || controlState.source !== 'browser' || !mediaPipeHands) {
                        stopBrowserCamera();
                        return;
                    }

                    if (mediaPipeCamera) {
                        mediaPipeCamera.stop();
                    }

                    mediaPipeCamera = new Camera(videoElement, {
                        onFrame: async () => {
                            if (controlState.source !== 'browser' || !mediaPipeHands) {
                                return;
                            }
                            await mediaPipeHands.send({image: videoElement});
                        },
                        width: 1920,
                        height: 1080
                    });

                    mediaPipeCamera.start();
                    browserCameraRunning = true;
                    statusElement.textContent = 'Browser camera ready';
                } catch (error) {
                    if (controlState.source === 'browser') {
                        statusElement.textContent = `Error accessing webcam: ${error.message}`;
                    }
                    console.error('Error accessing webcam:', error);
                }
            }

            function stopBrowserCamera() {
                browserStartToken++;

                if (mediaPipeCamera) {
                    try {
                        mediaPipeCamera.stop();
                    } catch (error) {
                        console.warn('Error stopping MediaPipe camera:', error);
                    }
                    mediaPipeCamera = null;
                }

                if (videoElement.srcObject) {
                    videoElement.srcObject.getTracks().forEach((track) => track.stop());
                    videoElement.srcObject = null;
                }

                browserCameraRunning = false;
                rightHandActive = false;
                leftHandActive = false;
                canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
                videoElement.style.display = 'none';
                canvasElement.style.display = 'none';
            }
            
            // Helper function to generate random neon colors
            function getRandomNeonColor() {
                const neonColors = [
                    0xFF00FF, // Magenta
                    0x00FFFF, // Cyan
                    0xFF3300, // Neon Orange
                    0x39FF14, // Neon Green
                    0xFF0099, // Neon Pink
                    0x00FF00, // Lime
                    0xFF6600, // Neon Orange-Red
                    0xFFFF00  // Yellow
                ];
                return neonColors[Math.floor(Math.random() * neonColors.length)];
            }

            function createParticleSphere({ count = 4200, radius = 2 }) {
                const geometry = new THREE.BufferGeometry();
                const positions = new Float32Array(count * 3);
                const colors = new Float32Array(count * 3);
                const phases = new Float32Array(count);
                const palette = [
                    new THREE.Color(0x00ffff),
                    new THREE.Color(0x39ff14),
                    new THREE.Color(0xffffff),
                    new THREE.Color(0x66ffcc),
                    new THREE.Color(0xff4fd8),
                ];

                for (let i = 0; i < count; i++) {
                    const pointIndex = i * 3;
                    const theta = Math.random() * Math.PI * 2;
                    const u = Math.random() * 2 - 1;
                    const shellBias = Math.random();
                    const particleRadius = radius * (0.38 + 0.62 * Math.pow(shellBias, 0.28));
                    const ring = Math.sqrt(1 - u * u);

                    positions[pointIndex] = particleRadius * ring * Math.cos(theta);
                    positions[pointIndex + 1] = particleRadius * u;
                    positions[pointIndex + 2] = particleRadius * ring * Math.sin(theta);

                    const color = palette[Math.floor(Math.random() * palette.length)].clone();
                    color.multiplyScalar(0.65 + Math.random() * 0.55);
                    colors[pointIndex] = color.r;
                    colors[pointIndex + 1] = color.g;
                    colors[pointIndex + 2] = color.b;
                    phases[i] = Math.random() * Math.PI * 2;
                }

                geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

                const material = new THREE.PointsMaterial({
                    size: 0.035,
                    sizeAttenuation: true,
                    vertexColors: true,
                    transparent: true,
                    opacity: 0.88,
                    depthWrite: false,
                    blending: THREE.AdditiveBlending,
                });

                particleBasePositions = new Float32Array(positions);
                particlePhases = phases;
                particleMaterial = material;
                return new THREE.Points(geometry, material);
            }
            
            // Initialize Three.js
            function initThreeJS() {
                // Create scene
                scene = new THREE.Scene();
                
                // Create camera
                camera = new THREE.PerspectiveCamera(
                    75, 
                    window.innerWidth / window.innerHeight, 
                    0.1, 
                    1000
                );
                camera.position.z = 5;
                
                // Create renderer with transparent background
                renderer = new THREE.WebGLRenderer({ 
                    antialias: true, 
                    alpha: true  // Enable transparency
                });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setClearColor(0x000000, 0); // Transparent background
                threeContainer.appendChild(renderer.domElement);
                
                // Create a particle sphere with a faint wireframe shell.
                const geometry = new THREE.SphereGeometry(2, 32, 32);
                
                // Create a group to hold the particle cloud and wireframe shell.
                sphere = new THREE.Group();

                particleMesh = createParticleSphere({ count: 4600, radius: 2 });
                sphere.add(particleMesh);

                // Keep a subtle transparent fill to make the volume readable on camera backgrounds.
                const solidMaterial = new THREE.MeshBasicMaterial({ 
                    color: 0x00ffff,
                    transparent: true,
                    opacity: 0.06,
                    depthWrite: false
                });
                solidMesh = new THREE.Mesh(geometry, solidMaterial);
                sphere.add(solidMesh);
                
                // Create faint wireframe mesh with cyan-white color.
                const wireframeMaterial = new THREE.MeshBasicMaterial({
                    color: 0xcfffff,
                    wireframe: true,
                    transparent: true,
                    opacity: 0.18,
                });
                wireframeMesh = new THREE.Mesh(geometry, wireframeMaterial);
                sphere.add(wireframeMesh);
                scene.add(sphere);
                
                // Add some ambient light
                const ambientLight = new THREE.AmbientLight(0xffffff, 1.0);
                scene.add(ambientLight);
                
                // Start animation loop
                animate();
            }
            
            // Animation loop for Three.js
            function animate() {
                requestAnimationFrame(animate);
                
                // Rotate the sphere continuously, regardless of hand interaction
                if (sphere) {
                    currentSphereSize = currentSphereSize + (controlState.targetScale - currentSphereSize) * smoothingFactor;
                    sphere.scale.set(currentSphereSize, currentSphereSize, currentSphereSize);

                    // Remove the condition that stops rotation during hand interaction
                    sphere.rotation.x += 0.003 + controlState.rotateX;
                    sphere.rotation.y += 0.008 + controlState.rotateY;
                    
                    // Add pulsing glow effect to the neon fill
                    const time = Date.now() * 0.001; // Convert to seconds
                    const pulseIntensity = 0.1 * Math.sin(time * 2) + 0.9; // Oscillate between 0.8 and 1.0

                    if (particleMesh && particleBasePositions && particlePhases) {
                        const positions = particleMesh.geometry.attributes.position.array;
                        for (let i = 0; i < particlePhases.length; i++) {
                            const pointIndex = i * 3;
                            const wave = 1 + 0.035 * Math.sin(time * 2.2 + particlePhases[i]);
                            positions[pointIndex] = particleBasePositions[pointIndex] * wave;
                            positions[pointIndex + 1] = particleBasePositions[pointIndex + 1] * wave;
                            positions[pointIndex + 2] = particleBasePositions[pointIndex + 2] * wave;
                        }
                        particleMesh.geometry.attributes.position.needsUpdate = true;
                        particleMesh.material.opacity = 0.74 + 0.16 * pulseIntensity;
                    }
                    
                    // Apply pulse to opacity
                    if (solidMesh && solidMesh.material) {
                        solidMesh.material.opacity = 0.035 + 0.035 * pulseIntensity;
                    }
                }

                updateControlReadout();

                // Render the scene
                renderer.render(scene, camera);
            }
            
            // Calculate distance between two 3D points
            function calculateDistance(point1, point2) {
                const dx = point1.x - point2.x;
                const dy = point1.y - point2.y;
                const dz = point1.z - point2.z;
                return Math.sqrt(dx * dx + dy * dy + dz * dz);
            }
            
            // Detect if a point is inside/near the sphere
            function isPointInSphere(point) {
                // Convert normalized coordinates to world space
                const worldX = (point.x - 0.5) * 10;
                const worldY = (0.5 - point.y) * 10; // Invert Y to match Three.js coordinate system
                const worldZ = 0; // Assume point is on Z=0 plane
                
                // Get sphere position in world space
                const spherePos = new THREE.Vector3();
                sphere.getWorldPosition(spherePos);
                
                // Calculate distance between point and sphere center
                const distance = Math.sqrt(
                    Math.pow(worldX - spherePos.x, 2) + 
                    Math.pow(worldY - spherePos.y, 2) + 
                    Math.pow(worldZ - spherePos.z, 2)
                );
                
                // Consider interaction if point is within or near the sphere surface
                // Using the current sphere size for detection
                const currentSize = sphere.scale.x * 2;
                return distance < currentSize * 1; // Add some buffer for easier interaction
            }
            
            // Initialize MediaPipe Hands
            async function initMediaPipeHands() {
                if (controlState.source !== 'browser') {
                    return null;
                }

                statusElement.textContent = 'Initializing MediaPipe Hands...';
                
                const hands = new Hands({
                    locateFile: (file) => {
                        return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
                    }
                });
                
                hands.setOptions({
                    maxNumHands: 2,
                    modelComplexity: 1,
                    minDetectionConfidence: 0.5,
                    minTrackingConfidence: 0.5
                });
                
                await hands.initialize();
                if (controlState.source === 'browser') {
                    statusElement.textContent = 'Hand tracking ready!';
                }
                
                return hands;
            }
            
            // Draw hand landmarks on canvas with dynamic sizing
            function drawLandmarks(landmarks, isLeft) {
                // Adjust line width and point size based on screen dimension
                const screenSize = Math.min(window.innerWidth, window.innerHeight);
                const lineWidth = Math.max(2, Math.min(5, screenSize / 300));
                const pointSize = Math.max(2, Math.min(8, screenSize / 250));
                
                // Define connections between landmarks
                const connections = [
                    // Thumb
                    [0, 1], [1, 2], [2, 3], [3, 4],
                    // Index finger
                    [0, 5], [5, 6], [6, 7], [7, 8],
                    // Middle finger
                    [0, 9], [9, 10], [10, 11], [11, 12],
                    // Ring finger
                    [0, 13], [13, 14], [14, 15], [15, 16],
                    // Pinky
                    [0, 17], [17, 18], [18, 19], [19, 20],
                    // Palm
                    [0, 5], [5, 9], [9, 13], [13, 17]
                ];
                
                // Choose a different color for each hand
                const handColor = isLeft ? '#00FF00' : '#00FFFF';
                
                // Draw connections
                canvasCtx.lineWidth = lineWidth;
                canvasCtx.strokeStyle = handColor;
                
                connections.forEach(([i, j]) => {
                    const start = landmarks[i];
                    const end = landmarks[j];
                    
                    canvasCtx.beginPath();
                    canvasCtx.moveTo(start.x * canvasElement.width, start.y * canvasElement.height);
                    canvasCtx.lineTo(end.x * canvasElement.width, end.y * canvasElement.height);
                    canvasCtx.stroke();
                });
                
                // Draw landmarks
                landmarks.forEach((landmark, index) => {
                    // Special color for thumb tip (index 4) and index finger tip (index 8)
                    let pointColor = handColor;
                    if (index === 4 || index === 8) {
                        pointColor = '#FF0000';
                    }
                    
                    canvasCtx.fillStyle = pointColor;
                    canvasCtx.beginPath();
                    canvasCtx.arc(
                        landmark.x * canvasElement.width,
                        landmark.y * canvasElement.height,
                        pointSize * 1.2,  // Make thumb and index fingertips slightly larger
                        0,
                        2 * Math.PI
                    );
                    canvasCtx.fill();
                });
            }

            function getRaspberryVideoRect() {
                const canvasWidth = canvasElement.width || window.innerWidth;
                const canvasHeight = canvasElement.height || window.innerHeight;
                const videoWidth = raspberryVideoElement.naturalWidth || 4;
                const videoHeight = raspberryVideoElement.naturalHeight || 3;
                const videoRatio = videoWidth / videoHeight;
                const canvasRatio = canvasWidth / canvasHeight;

                if (canvasRatio > videoRatio) {
                    const height = canvasHeight;
                    const width = height * videoRatio;
                    return {
                        x: (canvasWidth - width) / 2,
                        y: 0,
                        width,
                        height,
                    };
                }

                const width = canvasWidth;
                const height = width / videoRatio;
                return {
                    x: 0,
                    y: (canvasHeight - height) / 2,
                    width,
                    height,
                };
            }

            function drawRaspberryLandmarks() {
                if (controlState.source !== 'raspberry') {
                    return;
                }

                canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
                if (!controlState.handDetected || controlState.landmarks.length < 21) {
                    return;
                }

                const rect = getRaspberryVideoRect();
                const connections = [
                    [0, 1], [1, 2], [2, 3], [3, 4],
                    [0, 5], [5, 6], [6, 7], [7, 8],
                    [0, 9], [9, 10], [10, 11], [11, 12],
                    [0, 13], [13, 14], [14, 15], [15, 16],
                    [0, 17], [17, 18], [18, 19], [19, 20],
                    [5, 9], [9, 13], [13, 17],
                ];
                const toCanvasPoint = (point) => ({
                    x: rect.x + point.x * rect.width,
                    y: rect.y + point.y * rect.height,
                });

                canvasCtx.save();
                canvasCtx.lineWidth = 3;
                canvasCtx.strokeStyle = 'rgba(0, 255, 255, 0.95)';
                connections.forEach(([startIndex, endIndex]) => {
                    const start = controlState.landmarks[startIndex];
                    const end = controlState.landmarks[endIndex];
                    if (!start || !end) {
                        return;
                    }
                    const startPoint = toCanvasPoint(start);
                    const endPoint = toCanvasPoint(end);
                    canvasCtx.beginPath();
                    canvasCtx.moveTo(startPoint.x, startPoint.y);
                    canvasCtx.lineTo(endPoint.x, endPoint.y);
                    canvasCtx.stroke();
                });

                controlState.landmarks.forEach((landmark, index) => {
                    const point = toCanvasPoint(landmark);
                    const isPinchTip = index === 4 || index === 8;
                    canvasCtx.fillStyle = isPinchTip ? '#ff3b30' : '#39ff14';
                    canvasCtx.beginPath();
                    canvasCtx.arc(point.x, point.y, isPinchTip ? 7 : 5, 0, Math.PI * 2);
                    canvasCtx.fill();
                });
                canvasCtx.restore();
            }
            
            // Process video frames
            function onResults(results) {
                if (controlState.source !== 'browser' || !browserCameraRunning) {
                    return;
                }

                // Clear canvas
                canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
                
                // Make sure canvas size matches window
                if (canvasElement.width !== window.innerWidth || 
                    canvasElement.height !== window.innerHeight) {
                    updateCanvasSize();
                }
                
                // Reset the tracking flags for this frame
                rightHandActive = false;
                leftHandActive = false;
                
                // Process hand landmarks if detected
                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    // Update status text
                    statusElement.textContent = 
                        results.multiHandLandmarks.length === 1 ? '1 hand detected' :
                        `${results.multiHandLandmarks.length} hands detected`;
                    
                    // Process each hand
                    for (let handIndex = 0; handIndex < results.multiHandLandmarks.length; handIndex++) {
                        const landmarks = results.multiHandLandmarks[handIndex];
                        const handedness = results.multiHandedness[handIndex].label;
                        const isLeftHand = handedness === 'Left';
                        
                        // Draw the hand landmarks with appropriate color
                        drawLandmarks(landmarks, isLeftHand);
                        
                        if (!isLeftHand) {
                            // RIGHT HAND: Control sphere size with thumb-index distance
                            // Get thumb tip and index finger tip positions
                            const thumbTip = landmarks[4];
                            const indexTip = landmarks[8];
                            
                            // Calculate the distance between thumb and index finger
                            const pinchDistance = calculateDistance(thumbTip, indexTip);

                            if (controlState.source === 'browser') {
                                controlState.targetScale = mapPinchDistanceToScale(pinchDistance);
                                controlState.motion = true;
                                controlState.area = pinchDistance * 100000;
                                controlState.gesture = 'right_hand_pinch';
                                controlState.lastMessageAt = Date.now();
                            }
                            
                            rightHandActive = true;
                        } else {
                            // LEFT HAND: Change color when index finger touches sphere
                            // Get index finger tip position (landmark 8)
                            const indexTip = landmarks[8];
                            
                            // Check if index finger is touching the sphere
                            if (isPointInSphere(indexTip)) {
                                // Change color with a cooldown to prevent rapid changes
                                const currentTime = Date.now();
                                if (currentTime - lastColorChangeTime > colorChangeDelay) {
                                    // Change to a random neon color
                                    const newColor = getRandomNeonColor();
                                    if (solidMesh && solidMesh.material) {
                                        solidMesh.material.color.setHex(newColor);
                                    }
                                    if (particleMaterial) {
                                        particleMaterial.color.setHex(newColor);
                                    }
                                    lastColorChangeTime = currentTime;
                                }
                                
                                leftHandActive = true;
                            }
                        }
                    }
                } else {
                    statusElement.textContent = 'No hands detected';
                }
            }
            
            // Initialize and start the app
            async function startApp() {
                try {
                    initThreeJS(); // Initialize Three.js
                    await setMode('browser');

                } catch (error) {
                    if (controlState.source === 'browser') {
                        statusElement.textContent = `Browser camera unavailable: ${error.message}`;
                    }
                    console.error('Error starting application:', error);
                }
            }
            
            // Start the application
            startApp();
        });
    </script>
</body>
</html>
