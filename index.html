<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hand Tracking Demo with Three.js</title>
    <script defer src="https://cloud.umami.is/script.js" data-website-id="eb59c81c-27cb-4e1d-9e8c-bfbe70c48cd9"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000;
        }
        
        .container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        #webcam {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* Mirror the webcam feed */
            z-index: 0;
        }

        #raspberry-video {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: center center;
            display: none;
            background: #000;
            opacity: 0.62;
            z-index: 0;
            pointer-events: none;
        }
        
        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: scaleX(-1); /* Mirror the canvas to match webcam */
            pointer-events: none;
            z-index: 6;
        }
        
        #three-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }
        
        #status {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            background-color: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 5px;
            font-family: Arial, sans-serif;
            z-index: 10;
        }

        #control-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            width: min(320px, calc(100vw - 40px));
            color: #fff;
            background-color: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 12px;
            border-radius: 6px;
            font-family: Arial, sans-serif;
            font-size: 14px;
            z-index: 10;
        }

        .mode-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            margin-bottom: 8px;
        }

        .control-mode-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            margin: 8px 0;
        }

        .mode-buttons button,
        .control-mode-buttons button,
        #connect-raspberry {
            min-height: 34px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            color: #fff;
            background: rgba(255, 255, 255, 0.08);
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .mode-buttons button:hover,
        .control-mode-buttons button:hover,
        #connect-raspberry:hover {
            border-color: rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.15);
        }

        .mode-buttons button.active {
            color: #fff;
            background: rgba(0, 229, 255, 0.2);
            border-color: #00e5ff;
            box-shadow: 0 0 12px rgba(0, 229, 255, 0.35);
            text-shadow: 0 0 4px #00e5ff;
        }

        .control-mode-buttons button.active {
            color: #fff;
            background: rgba(186, 85, 211, 0.2);
            border-color: #ba55d3;
            box-shadow: 0 0 12px rgba(186, 85, 211, 0.35);
            text-shadow: 0 0 4px #ba55d3;
        }

        .shape-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
            margin: 8px 0;
        }

        .shape-buttons button {
            min-height: 34px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            color: #fff;
            background: rgba(255, 255, 255, 0.08);
            cursor: pointer;
            transition: all 0.25s ease;
            font-size: 11px;
            padding: 0 2px;
        }

        .shape-buttons button:hover {
            border-color: rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.15);
        }

        .shape-buttons button.active {
            color: #fff;
            background: rgba(255, 123, 84, 0.2);
            border-color: #ff7b54;
            box-shadow: 0 0 12px rgba(255, 123, 84, 0.35);
            text-shadow: 0 0 4px #ff7b54;
        }

        #ws-url,
        #mjpeg-url {
            box-sizing: border-box;
            width: 100%;
            height: 34px;
            margin-bottom: 6px;
            border: 1px solid rgba(255, 255, 255, 0.35);
            border-radius: 4px;
            color: #fff;
            background: rgba(0, 0, 0, 0.35);
            padding: 0 8px;
        }

        #control-readout {
            margin-top: 8px;
            line-height: 1.5;
            color: rgba(255, 255, 255, 0.9);
        }

        #links-para{
            position: absolute;
            bottom: 5px;
            left: 5px;
            font-family: Helvetica, sans-serif;
            font-size: 16px;
            background-color: rgba(255, 255, 255, 0.5);
            padding: 10px;
        }

        a {
            color: #0000FF !important;
        }
    </style>
</head>
<body>

        <canvas id="canvas"></canvas>

        <div id="control-panel">

    <p id="links-para"><a href="https://x.com/measure_plan" target="_blank">Twitter</a> | <a href="https://www.instagram.com/stereo.drift/" target="_blank">Instagram</a> | <a href="https://github.com/collidingScopes/threejs-handtracking-101" target="_blank">Source Code</a> | <a href="https://buymeacoffee.com/stereodrift" target="_blank">❤️</a></p>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/STLLoader.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const videoElement = document.getElementById('webcam');
            const raspberryVideoElement = document.getElementById('raspberry-video');
            const canvasElement = document.getElementById('canvas');
            const canvasCtx = canvasElement.getContext('2d');
            const statusElement = document.getElementById('status');
            const threeContainer = document.getElementById('three-canvas');
            const controlReadout = document.getElementById('control-readout');
            const wsUrlInput = document.getElementById('ws-url');
            const mjpegUrlInput = document.getElementById('mjpeg-url');
            const connectButton = document.getElementById('connect-raspberry');
            const modeButtons = document.querySelectorAll('[data-mode]');
            const controlModeButtons = document.querySelectorAll('[data-control-mode]');
            const shapeButtons = document.querySelectorAll('[data-shape]');
            
            // Particle configuration
            const PARTICLE_COUNT = 8000;
            
            // Three.js variables
            let scene, camera, renderer;
            let sphere, solidMesh, wireframeMesh, particleMesh, particleMaterial;
            let sphereColors = null;
            let particlePhases = null;
            
            // Shape morphing variables
            let targetShape = 'sphere';
            let sphereWeight = 1.0;
            let nailongBasePositions = null;
            let nailongColors = null;
            let nailongLoaded = false;
            let isNailongLoading = false;

            // Math shapes base coordinates and colors
            let spherePositions = null;
            let galaxyPositions = null;
            let saturnPositions = null;
            let lotusPositions = null;
            let leafPositions = null;
            let heartPositions = null;

            let galaxyColors = null;
            let saturnColors = null;
            let lotusColors = null;
            let leafColors = null;
            let heartColors = null;

            let currentBasePositions = null;
            let currentBaseColors = null;
            let brightnessFactors = null;

            // Jitter / Turbulence state variables
            let prevHandX = null;
            let prevHandY = null;
            let targetTurbulence = 0.0;
            let turbulenceAmount = 0.0;
            
            // Gesture shape switcher and lock state
            let gestureHistory = [];
            const GESTURE_HISTORY_LIMIT = 18; // ~0.6 seconds at 30fps
            const GESTURE_VOTE_THRESHOLD = 11; // requires 11 out of 18 votes to transition
            let shapeLocked = false;
            
            // Solid model variables
            let nailongSolidMesh = null;
            let nailongSolidMaterial = null;
            let solidOpacity = 0.0;
            
            // Hand tracking variables
            let rightHandActive = false;
            let leftHandActive = false;
            let lastColorChangeTime = 0;
            const colorChangeDelay = 500; // milliseconds
            let currentSphereSize = 1.0; // Default/starting size
            const smoothingFactor = 0.15; // Adjust this value between 0-1 (lower = smoother but slower)
            let raspberrySocket = null;
            let simulationTimer = null;
            let mediaPipeHands = null;
            let mediaPipeCamera = null;
            let browserCameraRunning = false;
            let browserStartToken = 0;

            const controlState = {
                source: 'browser',
                targetScale: 1.0,
                rotateX: 0,
                rotateY: 0,
                handRotX: 0,
                handRotY: 0,
                handRotZ: 0,
                motion: false,
                area: 0,
                gesture: 'none',
                handDetected: false,
                landmarkCount: 0,
                pinchDistance: 0,
                landmarks: [],
                controlMode: 'area',
                connected: false,
                lastMessageAt: 0
            };

            function clamp(value, min, max) {
                return Math.min(Math.max(value, min), max);
            }

            function mapPinchDistanceToScale(pinchDistance) {
                if (pinchDistance < 0.05) {
                    return 0.6;
                }
                if (pinchDistance > 0.25) {
                    return 2.0;
                }
                return 0.6 + (pinchDistance - 0.05) * (2.0 - 0.6) / (0.25 - 0.05);
            }

            function mapDualHandDistanceToScale(dist) {
                if (dist < 0.16) {
                    return 0.6;
                }
                if (dist > 0.68) {
                    return 2.5;
                }
                return 0.6 + (dist - 0.16) * (2.5 - 0.6) / (0.68 - 0.16);
            }

            function updateControlReadout() {
                const connectedText = controlState.connected ? 'yes' : 'no';
                const messageAge = controlState.lastMessageAt
                    ? `${((Date.now() - controlState.lastMessageAt) / 1000).toFixed(1)}s`
                    : '-';

                controlReadout.innerHTML = [
                    `source: ${controlState.source}`,
                    `control: ${controlState.controlMode}`,
                    `targetScale: ${controlState.targetScale.toFixed(2)}`,
                    `currentScale: ${currentSphereSize.toFixed(2)}`,
                    `motion: ${controlState.motion}`,
                    `area: ${Math.round(controlState.area)}`,
                    `hand: ${controlState.handDetected}`,
                    `landmarks: ${controlState.landmarkCount}`,
                    `pinch: ${controlState.pinchDistance.toFixed(3)}`,
                    `ws connected: ${connectedText}`,
                    `last message: ${messageAge}`
                ].join('<br>');
            }

            async function setMode(mode) {
                controlState.source = mode;
                modeButtons.forEach((button) => {
                    button.classList.toggle('active', button.dataset.mode === mode);
                });

                if (mode === 'browser') {
                    stopSimulation();
                    disconnectRaspberrySocket();
                    stopRaspberryVideo();
                    await startBrowserCamera();
                } else {
                    stopBrowserCamera();
                }

                if (mode === 'simulate') {
                    disconnectRaspberrySocket();
                    startSimulation();
                }
                if (mode !== 'simulate') {
                    stopSimulation();
                }

                if (mode === 'raspberry') {
                    canvasElement.style.display = 'block';
                    canvasElement.style.transform = 'none';
                    startRaspberryVideo();
                    statusElement.textContent = 'Raspberry mode ready';
                }
            }

            function setControlMode(mode) {
                controlState.controlMode = mode;
                controlModeButtons.forEach((button) => {
                    button.classList.toggle('active', button.dataset.controlMode === mode);
                });
            }

            function applyRaspberryControl(data) {
                controlState.source = 'raspberry';
                const areaScale = clamp(Number(data.scale ?? controlState.targetScale), 0.6, 2.5);
                const pinchDistance = Number(data.pinchDistance ?? 0);
                const pinchScale = clamp(mapPinchDistanceToScale(pinchDistance), 0.6, 2.5);
                controlState.rotateX = Number(data.rotateX ?? 0);
                controlState.rotateY = Number(data.rotateY ?? 0);
                controlState.motion = Boolean(data.motion);
                controlState.area = Number(data.area ?? 0);
                controlState.gesture = data.gesture || 'single_hand_area';
                controlState.handDetected = Boolean(data.handDetected);
                controlState.landmarkCount = Number(data.landmarkCount ?? 0);
                controlState.pinchDistance = pinchDistance;
                controlState.landmarks = Array.isArray(data.landmarks) ? data.landmarks : [];
                if (pinchDistance < 0.08) {
                    shapeLocked = true;
                } else if (pinchDistance > 0.16) {
                    shapeLocked = false;
                }

                if (controlState.handDetected && controlState.landmarks.length >= 21) {
                    const handRotation = calculateHandRotation(controlState.landmarks);
                    controlState.handRotX = handRotation.x;
                    controlState.handRotY = handRotation.y;
                    controlState.handRotZ = handRotation.z;
                    processShapeSwitchingGestures(controlState.landmarks);
                }
                if (controlState.controlMode === 'pinch') {
                    if (controlState.handDetected && controlState.landmarkCount >= 9) {
                        controlState.targetScale = pinchScale;
                    }
                } else if (controlState.controlMode === 'hybrid') {
                    controlState.targetScale = controlState.handDetected && controlState.landmarkCount >= 9
                        ? pinchScale
                        : areaScale;
                } else {
                    controlState.targetScale = areaScale;
                }
                controlState.lastMessageAt = Date.now();
                drawRaspberryLandmarks();
            }

            function connectRaspberrySocket() {
                if (raspberrySocket) {
                    raspberrySocket.close();
                    raspberrySocket = null;
                }

                setMode('raspberry');
                const socket = new WebSocket(wsUrlInput.value);
                raspberrySocket = socket;
                statusElement.textContent = 'Connecting to Raspberry Pi...';

                socket.addEventListener('open', () => {
                    if (raspberrySocket !== socket || controlState.source !== 'raspberry') {
                        return;
                    }
                    controlState.connected = true;
                    statusElement.textContent = 'Raspberry Pi connected';
                });

                socket.addEventListener('message', (event) => {
                    if (raspberrySocket !== socket || controlState.source !== 'raspberry') {
                        return;
                    }

                    try {
                        applyRaspberryControl(JSON.parse(event.data));
                    } catch (error) {
                        console.error('Invalid Raspberry Pi message:', event.data, error);
                    }
                });

                socket.addEventListener('close', () => {
                    if (raspberrySocket !== socket) {
                        return;
                    }

                    controlState.connected = false;
                    if (controlState.source === 'raspberry') {
                        statusElement.textContent = 'Raspberry Pi disconnected';
                    }
                });

                socket.addEventListener('error', () => {
                    if (raspberrySocket !== socket) {
                        return;
                    }

                    controlState.connected = false;
                    if (controlState.source === 'raspberry') {
                        statusElement.textContent = 'Raspberry Pi connection error';
                    }
                });
            }

            function disconnectRaspberrySocket() {
                if (!raspberrySocket) {
                    controlState.connected = false;
                    return;
                }

                raspberrySocket.close();
                raspberrySocket = null;
                controlState.connected = false;
            }

            function startRaspberryVideo() {
                raspberryVideoElement.src = '';
                raspberryVideoElement.style.display = 'block';
                raspberryVideoElement.src = mjpegUrlInput.value;
            }

            function stopRaspberryVideo() {
                raspberryVideoElement.removeAttribute('src');
                raspberryVideoElement.src = '';
                raspberryVideoElement.style.display = 'none';
                canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            }

            function startSimulation() {
                stopSimulation();
                stopRaspberryVideo();
                let phase = 0;
                simulationTimer = window.setInterval(() => {
                    phase += 0.12;
                    controlState.targetScale = 1.1 + Math.sin(phase) * 0.8;
                    controlState.rotateY = Math.cos(phase) * 0.01;
                    controlState.motion = true;
                    controlState.area = 8000 + Math.max(0, Math.sin(phase)) * 12000;
                    controlState.gesture = 'simulated_single_hand_area';
                    controlState.lastMessageAt = Date.now();
                    statusElement.textContent = 'Simulation mode';
                }, 60);
            }

            function stopSimulation() {
                if (simulationTimer) {
                    window.clearInterval(simulationTimer);
                    simulationTimer = null;
                }
            }

            // Sample points from loaded STL geometry using CDF area-weighting
            function samplePointsFromGeometry(geometry, targetCount) {
                const positionAttribute = geometry.getAttribute('position');
                const numVertices = positionAttribute.count;
                const numTriangles = Math.floor(numVertices / 3);
                
                const vA = new THREE.Vector3();
                const vB = new THREE.Vector3();
                const vC = new THREE.Vector3();
                
                // Calculate areas and CDF
                const cumulativeAreas = new Float64Array(numTriangles);
                let totalArea = 0;
                
                for (let i = 0; i < numTriangles; i++) {
                    vA.fromBufferAttribute(positionAttribute, i * 3);
                    vB.fromBufferAttribute(positionAttribute, i * 3 + 1);
                    vC.fromBufferAttribute(positionAttribute, i * 3 + 2);
                    
                    const edge1 = new THREE.Vector3().subVectors(vB, vA);
                    const edge2 = new THREE.Vector3().subVectors(vC, vA);
                    const cross = new THREE.Vector3().crossVectors(edge1, edge2);
                    const area = 0.5 * cross.length();
                    
                    totalArea += area;
                    cumulativeAreas[i] = totalArea;
                }
                
                const sampledPoints = new Float32Array(targetCount * 3);
                
                // Binary search helper
                function binarySearch(target) {
                    let low = 0;
                    let high = numTriangles - 1;
                    while (low < high) {
                        const mid = (low + high) >> 1;
                        if (cumulativeAreas[mid] < target) {
                            low = mid + 1;
                        } else {
                            high = mid;
                        }
                    }
                    return low;
                }
                
                for (let i = 0; i < targetCount; i++) {
                    const r = Math.random() * totalArea;
                    const triIndex = binarySearch(r);
                    
                    vA.fromBufferAttribute(positionAttribute, triIndex * 3);
                    vB.fromBufferAttribute(positionAttribute, triIndex * 3 + 1);
                    vC.fromBufferAttribute(positionAttribute, triIndex * 3 + 2);
                    
                    // Random point inside triangle
                    let r1 = Math.random();
                    let r2 = Math.random();
                    if (r1 + r2 > 1) {
                        r1 = 1 - r1;
                        r2 = 1 - r2;
                    }
                    const r3 = 1 - r1 - r2;
                    
                    let x = r3 * vA.x + r1 * vB.x + r2 * vC.x;
                    let y = r3 * vA.y + r1 * vB.y + r2 * vC.y;
                    let z = r3 * vA.z + r1 * vB.z + r2 * vC.z;
                    
                    // Volumetric filling: with 40% probability, scale the point inward towards center (0,0,0)
                    if (Math.random() < 0.40) {
                        const k = 0.15 + 0.80 * Math.random();
                        x *= k;
                        y *= k;
                        z *= k;
                    }
                    
                    sampledPoints[i * 3] = x;
                    sampledPoints[i * 3 + 1] = y;
                    sampledPoints[i * 3 + 2] = z;
                }
                
                return sampledPoints;
            }

            // Calculate hand rotation (roll, pitch, yaw) from MediaPipe landmarks
            function calculateHandRotation(landmarks) {
                if (!landmarks || landmarks.length < 21) {
                    return { x: 0, y: 0, z: 0 };
                }
                const p0 = landmarks[0];
                const p9 = landmarks[9];
                const p5 = landmarks[5];
                const p17 = landmarks[17];
                
                // 1. Roll (rotation around Z-axis)
                // Angle of the hand relative to vertical
                const roll = Math.atan2(p9.y - p0.y, p9.x - p0.x) + Math.PI / 2;
                
                // 2. Pitch and Yaw (rotation around X and Y axes)
                // Vectors on the palm plane
                const ux = p5.x - p0.x;
                const uy = p5.y - p0.y;
                const uz = p5.z - p0.z;
                
                const vx = p17.x - p0.x;
                const vy = p17.y - p0.y;
                const vz = p17.z - p0.z;
                
                // Normal vector of the palm (cross product)
                const nx = uy * vz - uz * vy;
                const ny = uz * vx - ux * vz;
                const nz = ux * vy - uy * vx;
                
                const len = Math.sqrt(nx*nx + ny*ny + nz*nz) || 1;
                const normX = nx / len;
                const normY = ny / len;
                
                // Map to rotation angles (limit rotation for ergonomic comfort)
                const pitch = normY * Math.PI * 0.45;
                const yaw = -normX * Math.PI * 0.45;
                
                return { x: pitch, y: yaw, z: -roll };
            }

            // On-demand load and sample Nailong STL
            function loadAndSampleNailong(targetShapeOnLoad = 'nailong') {
                if (isNailongLoading || nailongLoaded) return;
                isNailongLoading = true;
                statusElement.textContent = "Loading 3D model (24MB)... Please wait...";
                
                const loader = new THREE.STLLoader();
                loader.load('models/奶龙175mm高.stl', (geometry) => {
                    try {
                        // Align model to center
                        geometry.center();
                        // Orient model upright (typically stl is z-up, threejs is y-up)
                        geometry.rotateX(-Math.PI / 2);
                        
                        // Scale model to fit target bounding sphere radius of 2.0 (matching sphere)
                        geometry.computeBoundingSphere();
                        const radius = geometry.boundingSphere.radius;
                        const targetRadius = 2.0;
                        const scaleFactor = targetRadius / radius;
                        geometry.scale(scaleFactor, scaleFactor, scaleFactor);
                        
                        // Sample points (matching count in sphere creation)
                        nailongBasePositions = samplePointsFromGeometry(geometry, PARTICLE_COUNT);
                        
                        // Compute volumetric colors for Nailong based on body characteristics (Yellow body, White belly)
                        nailongColors = new Float32Array(PARTICLE_COUNT * 3);
                        for (let i = 0; i < PARTICLE_COUNT; i++) {
                            const pointIndex = i * 3;
                            const px = nailongBasePositions[pointIndex];
                            const py = nailongBasePositions[pointIndex + 1];
                            const pz = nailongBasePositions[pointIndex + 2];
                            
                            const color = getNailongParticleColor(px, py, pz);
                            nailongColors[pointIndex] = color.r;
                            nailongColors[pointIndex + 1] = color.g;
                            nailongColors[pointIndex + 2] = color.b;
                        }

                        // Create the solid standard material and mesh for Nailong
                        nailongSolidMaterial = new THREE.MeshStandardMaterial({
                            color: 0xffdd59, // Bright Nailong Yellow
                            roughness: 0.5,
                            metalness: 0.08,
                            transparent: true,
                            opacity: 0.0,
                            depthWrite: true,
                            depthTest: true
                        });
                        nailongSolidMesh = new THREE.Mesh(geometry, nailongSolidMaterial);
                        nailongSolidMesh.visible = false;
                        sphere.add(nailongSolidMesh);

                        nailongLoaded = true;
                        isNailongLoading = false;
                        
                        setTargetShape(targetShapeOnLoad);
                        statusElement.textContent = "Nailong loaded successfully!";
                        setTimeout(() => {
                            if (statusElement.textContent === "Nailong loaded successfully!") {
                                statusElement.textContent = "Hand tracking ready!";
                            }
                        }, 2000);
                    } catch (err) {
                        console.error("Error sampling STL geometry:", err);
                        statusElement.textContent = "Error parsing 3D model.";
                        isNailongLoading = false;
                    }
                }, (xhr) => {
                    if (xhr.total) {
                        const percent = Math.round((xhr.loaded / xhr.total) * 100);
                        statusElement.textContent = `Loading 3D model (24MB): ${percent}%`;
                    }
                }, (error) => {

                    statusElement.textContent = "Failed to load 3D model stl file.";
                    isNailongLoading = false;
                });

                canvasElement.height = window.innerHeight;

            window.addEventListener('resize', () => {

                if (renderer) {
